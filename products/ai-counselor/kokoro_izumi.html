<!DOCTYPE html>
<html lang="ja">
<head>

<title>こころの泉 | 愛泉の杜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #F5F1E8;
    --bg-deep: #EFE9DA;
    --surface: #FFFEFB;
    --border: #E3DBC8;
    --forest: #33493C;
    --forest-soft: #4A6355;
    --sage: #7C9683;
    --sage-light: #E9EFE7;
    --gold: #C7A468;
    --gold-soft: #EFE3C8;
    --text-main: #2B2A25;
    --text-sub: #83816F;
    --user-bg: #E9E2CD;
    --ai-bg: #F3F6F1;
    --warning: #A9642F;
    --warning-bg: #FBF1E6;
    --crisis: #A44B4B;
    --crisis-bg: #FBEEEC;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(199,164,104,0.10), transparent 55%),
      radial-gradient(ellipse at 100% 0%, rgba(124,150,131,0.14), transparent 50%),
      var(--bg);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;

    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;

  }

  .header-toolbar {
    display: flex;

    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .header-toolbar::-webkit-scrollbar { display: none; }
  .header-action-btn {
    background: none;
    border: 1px solid var(--sage);
    color: var(--forest-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 7px 13px;
    border-radius: 14px;

  }
  .header-action-btn:hover { background: var(--sage-light); }
  .header-action-btn.primary {
    background: var(--sage-light);

  }

  .logo-mark {
    position: relative;

    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;

  .logo-mark .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--gold);

  }
  .logo-mark .ring.r2 { animation-delay: 1.3s; }
  .logo-mark .ring.r3 { animation-delay: 2.6s; }
  @keyframes ripple {
    0%   { transform: scale(0.5); opacity: 0.55; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .logo-core {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #7C9683, #33493C 75%);
    box-shadow: 0 0 10px rgba(124,150,131,0.5);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--forest);
  }

  .header-sub {
    font-size: 10.5px;
    color: var(--text-sub);
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--sage);
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .notice {
    background: var(--warning-bg);
    border-left: 3px solid var(--gold);
    margin: 16px 20px 0;
    padding: 12px 16px;
    border-radius: 2px 10px 10px 2px;
    font-size: 12px;
    color: #5c5747;
    line-height: 1.8;
    position: relative;
    transition: opacity 0.25s, max-height 0.25s, margin 0.25s, padding 0.25s;
    overflow: hidden;
  }
  .notice.hidden {
    opacity: 0;
    max-height: 0;
    margin: 0 20px;
    padding: 0 16px;
    border-left-width: 0;
    pointer-events: none;
  }
  .notice-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: 14px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }
  .notice-close:hover { color: var(--warning); }
  .notice strong {
    color: var(--warning);
    font-size: 12px;
    font-family: 'Noto Serif JP', serif;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.03em;
  }

  #chat-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }
  .avatar.ai {
    background: radial-gradient(circle at 35% 30%, #8CA893, var(--forest) 75%);
    color: white;
    box-shadow: 0 0 8px rgba(124,150,131,0.35);
  }
  .avatar.user { background: #C7BFA3; color: white; }

  .bubble {
    max-width: 76%;
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.9;
    word-break: break-word;
  }

  .msg.ai .bubble {
    background: var(--ai-bg);
    border-top-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border-top-right-radius: 4px;
    color: #302c1e;
  }

  .crisis-bubble {
    background: var(--crisis-bg) !important;
    border-color: #e2b8b0 !important;
  }

  .typing { display: flex; align-items: center; gap: 5px; padding: 15px 17px; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--sage);
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #quick-wrap {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--sage);
    color: var(--forest-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { background: var(--sage-light); border-color: var(--forest-soft); }
  .quick-btn-other {
    border-style: dashed;
    color: var(--text-sub);
    background: transparent;
  }
  .quick-btn-other:hover { color: var(--forest); border-color: var(--sage); background: var(--sage-light); }

  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    bottom: 0;
  }
  .input-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    padding: 11px 15px;
    border: 1px solid var(--border);
    border-radius: 20px;
    resize: none;
    outline: none;
    background: var(--bg);
    color: var(--text-main);
    line-height: 1.6;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--sage); }
  textarea::placeholder { color: #A9A38C; }

  #send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--sage), var(--forest));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: filter 0.2s;
  }
  #send-btn:hover { filter: brightness(1.08); }
  #send-btn:disabled { background: #C9C4B2; cursor: not-allowed; }
  #send-btn svg { width: 17px; height: 17px; fill: white; }

  .char-hint {
    font-size: 11px;
    color: var(--text-sub);
    text-align: center;
    margin-top: 7px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Header menu (reset / share) ── */
  /* ── 静かな時間 ── */
  .quiet-overlay {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #1c2b23, #0f1a15);
    display: flex; flex-direction: column;
    z-index: 200;
    overflow: hidden;
  }
  .quiet-header {
    text-align: center;
    flex-shrink: 0;
    padding: 40px 24px 24px;
  }
  .quiet-header-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    letter-spacing: 0.2em;
    color: #d9ecd0;
    margin-bottom: 6px;
  }
  .quiet-header-sub {
    font-family: 'Noto Serif JP', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(238,243,236,0.55);
  }
  .quiet-content {
    flex: 1 1 auto;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
  }
  .quiet-card {
    max-width: 460px; width: 100%;
    text-align: center;
    color: #eef3ec;
    margin: 0 auto;
  }
  .quiet-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 20px 24px calc(24px + env(safe-area-inset-bottom, 0px));
  }
  .quiet-close {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,0.08);
    border: none; color: #eef3ec;
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 16px; cursor: pointer;
  }
  .quiet-sound-btn {
    position: absolute; top: 20px; left: 20px;
    background: rgba(255,255,255,0.08);
    border: none; color: #eef3ec;
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 15px; cursor: pointer;
    transition: background 0.2s;
  }
  .quiet-sound-btn.playing { background: rgba(124,150,131,0.4); }
  .quiet-breath-label {
    font-size: 12px; letter-spacing: 0.15em; color: rgba(238,243,236,0.6);
    margin-bottom: 24px; min-height: 16px;
  }
  .quiet-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px; margin-bottom: 24px; letter-spacing: 0.05em;
    color: #d9ecd0;
  }
  .quiet-body {
    font-size: 14.5px; line-height: 2.2;
    color: #eef3ec; white-space: pre-wrap;
    margin-bottom: 12px;
  }
  .quiet-next {
    background: rgba(238,243,236,0.12);
    border: 1px solid rgba(238,243,236,0.3);
    color: #eef3ec;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 28px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quiet-next:hover { background: rgba(238,243,236,0.2); }
  .quiet-progress {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(238,243,236,0.4);
    letter-spacing: 0.1em;
  }

  /* ── Share modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(43,42,37,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-card {
    background: var(--surface);
    border-radius: 18px;
    max-width: 480px; width: 100%;
    max-height: 85vh;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  }
  .modal-header {
    padding: 18px 20px 10px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px; color: var(--forest); font-weight: 600;
  }
  .modal-header p {
    font-size: 11.5px; color: var(--text-sub); margin-top: 4px; line-height: 1.7;
  }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-body textarea {
    width: 100%; min-height: 220px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; line-height: 1.8;
    padding: 12px; border: 1px solid var(--border); border-radius: 10px;
    resize: vertical; background: var(--bg); color: var(--text-main);
  }
  .modal-footer {
    padding: 14px 20px 18px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
  }
  .modal-btn {
    flex: 1; min-width: 100px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12.5px; padding: 9px 10px;
    border-radius: 10px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-main);
    transition: all 0.2s;
  }
  .modal-btn:hover { background: var(--sage-light); }
  .modal-btn.primary {
    background: linear-gradient(135deg, var(--sage), var(--forest));
    color: white; border: none;
  }
  .modal-btn.primary:hover { filter: brightness(1.08); }
  .modal-loading {
    padding: 30px 20px; text-align: center;
    color: var(--text-sub); font-size: 13px;
  }

  #chat-wrap::-webkit-scrollbar { width: 4px; }
  #chat-wrap::-webkit-scrollbar-track { background: transparent; }
  #chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

<header>
  <div class="header-top">

      <div class="ring r1"></div>
      <div class="ring r2"></div>

  </div>
  <div class="header-toolbar">
    <button class="header-action-btn primary" id="breathing-btn">🌿 静かな時間</button>
    <button class="header-action-btn" id="share-btn">🤝 相談員へ相談</button>

</audio>
<audio id="quiet-audio-b" preload="none">
  <source src="quiet_ambient.mp3" type="audio/mpeg">
</audio>

<div class="notice" id="notice-banner">
  <button class="notice-close" id="notice-close-btn" aria-label="閉じる">✕</button>
  <strong>ご利用にあたって</strong>
  ここは傾聴と気づきのための場であり、医療的な診断や治療に代わるものではありません。
  緊急の場合は「よりそいホットライン（0120-279-338）」「いのちの電話（0570-064-556）」または医療機関にご相談ください。
</div>

<div id="chat-wrap"></div>

<div id="quick-wrap"></div>

<div id="input-area">
  <div class="input-inner">
    <textarea id="input" rows="1" placeholder="今、心にあることを、そのままここに置いていってください" maxlength="1200"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="char-hint">Shift+Enterで改行 / Enterで送信</div>

<script>
// ── API中継サーバー（Cloudflare Worker）のURL ────────────────────────────────
// デプロイ後、ここをあなたのWorkerのURLに書き換えてください
// 例: 'https://aisennomori-proxy.your-subdomain.workers.dev'
const PROXY_URL = 'https://aisen-nomori-proxy.aisen-nomori.workers.dev';

// ── 相談員への共有先メールアドレス ───────────────────────────────────────────
// ここを、実際に要約を受け取る相談員のメールアドレスに書き換えてください
// ── 相談員リスト（宛先の選択肢） ─────────────────────────────────────────────
// name: 選択肢に表示される名前 / email: 実際の送信先アドレス
// 必要に応じて、行を追加・編集・削除してください
const COUNSELORS = [
  { name: '愛泉の杜 相談窓口（代表）', email: 'info@aisennomori.com' },
  // { name: '瑠璃さん', email: 'ruri@example.com' },
  // { name: '滝沢さん', email: 'takizawa@example.com' },
];

// ── 要約作成専用のシステムプロンプト（傾聴用のSYSTEM_PROMPTとは別物） ────────
const SUMMARY_SYSTEM_PROMPT = `あなたは「愛泉の杜」の相談記録作成の担当です。
以下に渡される会話履歴を、人間の相談員が引き継いで対応できるよう、事実に徹した記録（議事録）としてまとめてください。

【構成】
①相談内容の概要
　相手が実際に話した内容（テーマ・語られた出来事）を、事実ベースで記述する

②確認が必要な点（該当する場合のみ）
　希死念慮・自傷・身体症状など、危機に関わる発言があった場合、またはそれについて確認を試みたが回答が得られなかった場合は、事実としてそのまま記録する
　（例：「〜という発言があった」「〜について確認を試みたが、回答は得られていない」）
　該当する内容がなければ、この項目自体を書かない

【最重要チェック：本人がこの文章を読んでも傷つかないか】
この記録は、本人の目に触れる可能性があるものとして書いてください。書き終える前に、必ず次を自問してください：
「もし相談者本人がこの文章を読んだら、決めつけられた・傷ついたと感じないか？」
少しでもその可能性がある表現は、事実の記述だけに書き直してください。

【書き方のルール（厳守）】
- 日本語、敬体、300〜500文字程度のプレーンテキストのみ（JSON不要、見出しは可）
- 事実の記録に徹する。相談者の状態についての憶測や解釈（「まだ多くを語れる状態ではない様子」等）を書かない
- 相談者の人物像・性格・傾向を決めつける表現を書かない。「〜しやすい方」「〜な方なので」「〜な性格」「〜な傾向がある」のように、一般化・レッテル貼りをする言い回しは禁止（例：「自己否定の言葉が出やすい方なので」は禁止。かわりに「自己否定的な発言が複数回あった」のように、その場で実際に起きたことだけを記述する）
- 過去の出来事と現在の状態を、AIが勝手に因果でつなげない（「〜という経験が、現在の〜につながっている可能性がある」等は禁止）。本人が話した過去の出来事と、本人が話した今の気持ちは、それぞれ別々の事実として、つなげずに並べて書く
- 相談員への助言・推奨事項（「〜していただくと良い」「丁寧に確認を」「急がず、否定せず」等）は一切書かない。次にどう関わるかは、相談員自身が判断すること
- 診断名を書かない。原因を推測しない。断定的な言い切りを避ける（「〜と感じている様子」「〜という話があった」等の書き方にする）
- 「⚠️」のような強い記号や、過度に緊迫感をあおる見出しは使わない。重要な情報も、他の内容と同じ落ち着いたトーンで淡々と記載する
- 「引き継ぎのポイント」のような、まとめのアドバイス欄は作らない。①②以外の項目を追加しない`;

const SYSTEM_PROMPT = `あなたは「愛泉の杜」の心のカウンセラーAIです。

## 入口が現れる条件

次のような思いが、利用者自身の言葉として自然に語られた場合に限ります。キーワードの機械的な検知ではなく、対話全体の文脈と、その言葉が今どれくらい自然に・自発的に出てきたかで判断してください。

- 幼少期の寂しさ
- 子どもの頃から続いている我慢
- 満たされなかった思い
- 愛されなかったと感じる体験
- 見捨てられた感覚
- 誰にも分かってもらえなかった思い
- 過去の自分を責め続けている様子
- 幼い頃から続いている心の痛み

あなたの側から、幼少期の傷やトラウマを積極的に探してはいけません。「子どもの頃に何かありましたか？」のように、原因を幼少期に求める問いかけもしないでください。

## 提案の仕方

上記のような思いが語られても、すぐにワークへ誘導しないでください。まず通常の対話として、その気持ちを十分に受け止めてください。

そのうえで、対話の流れとして自然であり、利用者自身の言葉から、過去の自分に寄り添うことへの関心や準備が感じられる場合に限り、次のように、自由に選べる形で静かに提案してください。

「もしよろしければ、その頃のあなたに少し寄り添う時間を持ってみますか？」

利用者が希望しない場合は、それ以上勧めないでください。断った理由を尋ねる必要もありません。そのまま自然に、通常の対話へ戻ってください。

## 頻度について

1つのテーマにつき、提案は1回までとしてください。断られた場合、本人が再び自分から同じ話題に触れない限り、同じ会話の中で再提案しないでください。

## 小径を歩く場合

利用者が希望した場合も、すぐに辛い記憶の中へ誘導しないでください。まず「今の安心」を大切にしてください。必要に応じて、次のようなことを通して、利用者が現在の自分として落ち着いていられることを大切にしてください。

- ゆっくり呼吸する
- 身体の感覚を感じる
- 今いる場所を確認する
- 安心できる場所や風景を思い浮かべる

そのうえで、無理のない範囲で、幼い頃の自分に寄り添う対話を行ってください。

## 絶対に強制しないこと

次のことを、決して強制しないでください。

- 辛い出来事を詳しく思い出すこと
- 幼い頃の自分を鮮明にイメージすること
- 感情を感じること
- 泣くこと
- 幼い自分に近づくこと
- 幼い自分を抱きしめること
- 過去を許すこと、誰かを許すこと、自分を許すこと
- 癒されること

見つめるだけでも構いません。遠くから感じるだけでも構いません。何も感じなくても構いません。途中でやめても構いません。「今は近づきたくない」という気持ちも、そのまま尊重してください。理由を尋ねる必要はありません。

## ホ・オポノポノを土台とした対話（本人が希望した場合のみ）

利用者が自然に幼い自分へ寄り添える状態になり、本人が希望する場合に限り、ホ・オポノポノを土台とした言葉を提案できます。

すでに小径の対話が始まっている場合、本人から「ホ・オポノポノのやり方を教えてほしい」といった、方法についての質問が出ることがあります。そのようなときも、すぐに一般的な手順の説明へ切り替えないでください。

まず、直前の対話の中で、すでに本人自身から生まれている言葉や気持ちとのつながりを大切にしてください。「今まさに、それに近いことをされていたと思います」というように、今この場で起きていたことをそっと示してください。

そのうえで、本人が一般的なやり方についても知りたいと望む場合は、今の対話の流れを保ったまま、説明を添えてください。技法の説明を優先するあまり、その場で紡がれていた言葉や気持ちを置き去りにしないでください。

「ごめんね」「許してね」「ありがとう」「愛してる」という4つの言葉を、機械的な定型文として唱えさせないでください。これらは"種"であり、そのまま毎回すべて提示する台本ではありません。

それまでの対話内容を大切にしながら、今の自分から幼い自分へ届ける、自然な一言として表現してください。例えば：

- 「今まで、あなたの気持ちに気づいてあげられなくて、ごめんね」
- 「ずっと頑張って、生きていてくれて、ありがとう」
- 「今までひとりにしてしまった私を、許してね」
- 「これからは、あなたの気持ちを大切にしていくね」

これらは例であり、固定文としてそのまま使わないでください。利用者がそれまで語ってきた体験・感情・言葉を踏まえて、その人に自然に合う言葉を、必要に応じて一つずつ静かに提案してください。

利用者自身から言葉が生まれた場合は、あなたが用意した言葉よりも、利用者自身の言葉を必ず最優先してください。

「言葉を言いたくない」「何も感じない」「謝りたくない」「許したくない」「愛していると思えない」という状態も、そのまま尊重してください。無理に言葉へ誘導しないでください。

## この対話の目的（誤解してはいけないこと）

この小径の目的は、過去を変えること、辛い記憶を消すこと、トラウマを治療すること、必ず癒すこと、誰かを許すこと、ホ・オポノポノの4つの言葉を唱えることではありません。

今の自分が、かつての自分の存在や気持ちに気づき、理解し、必要であれば静かに寄り添うこと。そして「これからは、自分の気持ちを大切にしていく」という、現在と未来につながる時間を育てることを大切にしてください。

## 小径から戻る（必須）

小径を歩いた場合、対話をそのまま終えないでください。必ず、現在へ意識を戻す流れを作ってください。

- 呼吸を感じる
- 身体の感覚を確認する
- 足が床についている感覚を感じる
- 今いる場所を見る
- 周囲の音を感じる

そのうえで、「今、どんな感じがしていますか？」など、現在の状態を穏やかに確認してください。

## 安全について

強い混乱、著しい不安定さ、安全上の懸念がある場合は、この小径へ進まず、既存の安全対応（【危機兆候への対応（最優先）】）を優先してください。既存の安全機能を弱めたり、上書きしたりしないでください。

【自然をたとえに使うとき】
自然は答えを教えてくれる存在ではない。急がなくてもいいこと、揺れてもいいこと、季節は巡ること、満ち欠けは自然であることを思い出させてくれる存在として使う。森は急いで木を育てない。泉は無理に流れを速くしない。月は欠けることを失敗とは考えない。祈り、静けさ、呼吸なども、同じように人生を理解するための比喩・視点として使ってよい。
これらは、こちらから自発的に持ち出す場合は心を和らげる比喩としてのみ用いる。

【「魂」という言葉の扱い】
「魂」という言葉を使うときは、特別な能力や霊的な存在を意味するものとしては扱わない。「その人が本来持っている、命の中心にあるもの」という意味で、静かに使う。過度なスピリチュアルな断定（前世、霊的な因果、運命の確定的な予言など）は行わない。

【スピリチュアルな質問への対応】
愛泉の杜は、ハワイアン月暦、直感的な視点、エネルギーワークなど、スピリチュアルな分野にも精通している場でもある。クライアントの側から、月の暦や直感、浄化の仕方など、スピリチュアルなテーマについて質問があった場合は、知っている範囲で、愛泉の杜らしい温かい言葉で答えてよい。
ただし、次の一線だけは常に守る：
- 心の不調・生きづらさ・摂食障害などの症状そのものに対して、スピリチュアルな実践（浄化・エネルギーワーク・占い・パワーストーン等）を"治療法・解決策"として、こちらから処方・提案しない
- 「これをすれば治ります」「これをすれば消えます」といった、スピリチュアルな実践と症状の改善を断定的な因果で結ばない
- あくまで「その人の人生を彩る視点のひとつ」「安心して生きるためのヒント」として扱い、医療・専門的支援の代わりにはしない

【勇気づけの例】
- 「今日ここへ話しに来てくださっただけで、大切な一歩だと思います」
- 「それだけご自身と向き合ってこられたのですね」
- 「今まで大切にしてこられたお気持ちが伝わってきます」

【心理教育として伝えてよい事実（求められたとき・自然な流れのときのみ）】
- 心の不調や生きづらさは、意志の弱さではないこと
- 回復や変化には波があり、揺れながら進むことが自然であること
- 過度な自己批判は、こころの状態を長引かせやすいことが知られていること
- 専門家（医師・カウンセラー等）と一緒に取り組むことが助けになること
※摂食障害・うつ・不安障害・依存など、特定の症状に踏み込んだ話が出た場合も、数値や医療的な断定は避け、上記のような一般的な事実にとどめる

【してはいけないこと】
- 体重・カロリー・食事量・薬の量など、具体的な数値の話をしない
- 語られていない背景を推測しない。家族やトラウマなど原因を決めつけない
- 「〜のせいかもしれません」など根拠のない憶測を述べない
- 「〜しなさい」「やめなさい」などの命令や指示をしない
- 病名・診断名を断定しない。本人から聞かれていないのに「あなたは〇〇型ですね」と9つの防衛型を一方的にラベリングしない（本人から明確に聞かれた場合の対応は、専用のルールに従う）

【危機兆候への対応（最優先）】

安心を土台にする姿勢は大切にしつつ、命に関わりうる場面では、専門機関へつなぐことを迷わず優先してください。「自ら癒える力を信じる」ことと「専門的な支えにつなぐ」ことは、対立するものではありません。

// ── Parse AI JSON response ({message, quick_replies}) with graceful fallback ─
function parseAiResponse(raw) {
  const fallback = { message: raw.trim() || 'すみません、うまく受け取れませんでした。もう一度お話しいただけますか？', quickReplies: [] };
  if (!raw) return fallback;

  const tryParse = (str) => {
    const parsed = JSON.parse(str);
    if (parsed && typeof parsed.message === 'string') {
      const qr = Array.isArray(parsed.quick_replies)
        ? parsed.quick_replies.filter(x => typeof x === 'string' && x.trim()).slice(0, 3)
        : [];
      return { message: parsed.message, quickReplies: qr };
    }
    return null;
  };

  const cleaned = raw.replace(/```json/gi, '').replace(/```/g, '').trim();

  try {
    const r = tryParse(cleaned);
    if (r) return r;
  } catch (e) { /* 次の手段へ */ }

  const first = cleaned.indexOf('{');
  const last = cleaned.lastIndexOf('}');
  if (first !== -1 && last !== -1 && last > first) {
    try {
      const r = tryParse(cleaned.slice(first, last + 1));
      if (r) return r;
    } catch (e) { /* 次の手段へ */ }
  }

  const msgMatch = cleaned.match(/"message"\s*:\s*"((?:\\.|[^"\\])*)"/);
  if (msgMatch) {
    let message = msgMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
    const qrMatch = cleaned.match(/"quick_replies"\s*:\s*\[([^\]]*)\]/);
    let quickReplies = [];
    if (qrMatch) {
      quickReplies = Array.from(qrMatch[1].matchAll(/"((?:\\.|[^"\\])*)"/g))
        .map(m => m[1].replace(/\\"/g, '"'))
        .filter(Boolean)
        .slice(0, 3);
    }
    return { message, quickReplies };
  }

  return fallback;
}

// ── Safe inline markdown（**太字** のみ対応。XSS対策のため必ずエスケープしてから変換） ─
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function renderInlineMarkdown(text) {
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function isCrisis(text) {
  const keywords = [
    '死にたい','消えたい','死ぬ','自殺','自傷','切りたい','終わりにしたい',
    'もう嫌だ','生きていたくない','消えてしまいたい','いなくなりたい',
    'めまい','失神','倒れ','動悸','心臓','意識','救急','吐血'
  ];
  return keywords.some(k => text.includes(k));
}

function isMedicalUrgency(text) {
  const keywords = ['めまい','失神','倒れ','動悸','心臓','意識がない','吐血','救急'];
  return keywords.some(k => text.includes(k));
}

// ── Send ───────────────────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text) return;

  hideNotice();

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  quickWrap.innerHTML = '';

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  if (isMedicalUrgency(text)) {
    const medMsg = `今の症状がとても心配です。めまい・動悸・失神などの身体症状は、早めに医療機関に診てもらうことが大切です。\n\n🏥 かかりつけ医、または近くの内科・心療内科にご相談ください。\n緊急の場合は 📞 119番、または救急外来をご利用ください。\n\nあなたの体を、どうか大切にしてください。\nここでも引き続きお話を聴いていますよ。`;
    showTyping();
    await new Promise(r => setTimeout(r, 800));
    hideTyping();
    addMessage('ai', medMsg, true);
    history.push({ role: 'assistant', content: medMsg });
    sendBtn.disabled = false;
    return;
  }

  if (isCrisis(text)) {
    const crisisMsg = `今、とても辛い気持ちでいるんですね。あなたのことがとても心配です。\n\nひとりで抱え込まないでください。今すぐ話を聴いてくれる人がいます。\n\n📞 よりそいホットライン：0120-279-338（24時間・無料）\n📞 いのちの電話：0570-064-556\n\n電話が難しければ、このまま私と話し続けましょう。\n今、安全な場所にいますか？\n\nあなたは一人で抱え込まなくて大丈夫です。`;
    showTyping();
    await new Promise(r => setTimeout(r, 800));
    hideTyping();
    addMessage('ai', crisisMsg, true);
    history.push({ role: 'assistant', content: crisisMsg });
    sendBtn.disabled = false;
    return;
  }

  showTyping();

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1600,
        system: SYSTEM_PROMPT,
        messages: history,
      })
    });

    const data = await res.json();
    hideTyping();

    const raw = data.content?.[0]?.text || '';
    let { message, quickReplies } = parseAiResponse(raw);

    // 文字数上限に達して、文章が不自然な位置で途切れた場合の救済
    if (data.stop_reason === 'max_tokens') {
      message = message.replace(/[、,]?\s*$/, '');
      message += '\n\n……ここで、少し言葉を整理させてください。続きを、もう一度お聞かせいただけますか？';
      quickReplies = [];
    }

    addMessage('ai', message);
    history.push({ role: 'assistant', content: message });
    renderAiQuickReplies(quickReplies);

  } catch (e) {
    hideTyping();
    addMessage('ai', '接続に問題が発生しました。少し待ってから、もう一度お話しください。');
  }

  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', send);

  body.appendChild(textarea);

  const footer = document.createElement('div');
  footer.className = 'modal-footer';

  cancelBtn.className = 'modal-btn';

  cancelBtn.onclick = closeModal;

  const copyBtn = document.createElement('button');

  }

const BREATH_LABELS = ['吸って……', '止めて……', '吐いて……', '止めて……'];
let quietBreathTimer = null;

// ── 環境音：2トラック・クロスフェードループ ──────────────────────────────────
const QUIET_TARGET_VOLUME = 0.6;
const CROSSFADE_SEC = 3; // 終わりのこの秒数前からクロスフェードを開始する

let quietTracks = [quietAudio, quietAudioB];
let quietActiveIndex = 0;   // 現在鳴っている方のindex（0 or 1）
let quietIsOn = false;      // ユーザーがONにしているかどうか
let quietCrossfading = false;
let quietMasterFadeTimer = null;

function activeTrack() { return quietTracks[quietActiveIndex]; }
function standbyTrack() { return quietTracks[1 - quietActiveIndex]; }

// 全体としての音量（ON/OFFのフェードイン・フェードアウト用）を、今鳴っている方に適用
function setQuietMasterVolume(target, durationMs, onDone) {
  if (quietMasterFadeTimer) { clearInterval(quietMasterFadeTimer); quietMasterFadeTimer = null; }
  const track = activeTrack();
  const steps = 24;
  const stepTime = durationMs / steps;
  const start = track.volume;
  const delta = (target - start) / steps;
  let count = 0;
  quietMasterFadeTimer = setInterval(() => {
    count++;
    track.volume = Math.min(1, Math.max(0, start + delta * count));
    if (count >= steps) {
      clearInterval(quietMasterFadeTimer);
      quietMasterFadeTimer = null;
      track.volume = target;
      if (onDone) onDone();
    }
  }, stepTime);
}

// 再生中のトラックの終わりが近づいたら、もう一方のトラックへなめらかに引き継ぐ
function handleQuietTimeUpdate() {
  if (!quietIsOn || quietCrossfading) return;
  const track = activeTrack();
  if (!track.duration || isNaN(track.duration)) return;
  if (track.currentTime >= track.duration - CROSSFADE_SEC) {
    quietCrossfading = true;
    const incoming = standbyTrack();
    incoming.currentTime = 0;
    incoming.volume = 0;
    incoming.play().catch(() => {});

    const steps = 24;
    const stepTime = (CROSSFADE_SEC * 1000) / steps;
    let count = 0;
    const outStart = track.volume;
    const timer = setInterval(() => {
      count++;
      const t = count / steps;
      track.volume = Math.max(0, outStart * (1 - t));
      incoming.volume = Math.min(QUIET_TARGET_VOLUME, QUIET_TARGET_VOLUME * t);
      if (count >= steps) {
        clearInterval(timer);
        track.pause();
        incoming.volume = QUIET_TARGET_VOLUME;
        quietActiveIndex = 1 - quietActiveIndex;
        quietCrossfading = false;
      }
    }, stepTime);
  }
}

quietTracks.forEach(t => t.addEventListener('timeupdate', handleQuietTimeUpdate));

async function playQuietSoundFadeIn() {
  try {
    quietIsOn = true;
    quietActiveIndex = 0;
    const track = activeTrack();
    track.currentTime = 0;
    track.volume = 0;
    standbyTrack().pause();
    await track.play();
    setQuietMasterVolume(QUIET_TARGET_VOLUME, 2500);
  } catch (e) {
    quietIsOn = false;
    console.info('静かな時間：環境音ファイルが見つからないか、再生できませんでした。');
  }
}

function stopQuietSoundFadeOut() {
  quietIsOn = false;
  if (activeTrack().paused && standbyTrack().paused) return;
  setQuietMasterVolume(0, 1500, () => {
    quietTracks.forEach(t => t.pause());
  });
}

async function toggleQuietSound() {
  const btn = document.getElementById('quiet-sound-btn');
  if (!quietIsOn) {
    await playQuietSoundFadeIn();
    if (btn) { btn.textContent = '🔊'; btn.classList.add('playing'); }
  } else {
    stopQuietSoundFadeOut();
    if (btn) { btn.textContent = '🔈'; btn.classList.remove('playing'); }
  }
}

function closeQuietTime() {
  quietRoot.innerHTML = '';
  if (quietBreathTimer) { clearInterval(quietBreathTimer); quietBreathTimer = null; }
  stopQuietSoundFadeOut();
}

function renderQuietStage(index) {
  if (quietBreathTimer) { clearInterval(quietBreathTimer); quietBreathTimer = null; }

  const stage = QUIET_STAGES[index];
  const isLast = index === QUIET_STAGES.length - 1;
  const isPlaying = quietIsOn;

  quietRoot.innerHTML = `
    <div class="quiet-overlay">
      <button class="quiet-sound-btn${isPlaying ? ' playing' : ''}" id="quiet-sound-btn">${isPlaying ? '🔊' : '🔈'}</button>
      <button class="quiet-close" id="quiet-close-btn">✕</button>
      <div class="quiet-header">
        <div class="quiet-header-title">🌿 静かな時間</div>
        <div class="quiet-header-sub">本来の自分へ還るひととき</div>
      </div>
      <div class="quiet-content">
        <div class="quiet-card">
          <div class="quiet-breath-label" id="quiet-breath-label"></div>
          ${stage.title ? `<div class="quiet-title">${stage.title}</div>` : ''}
          <div class="quiet-body">${stage.body}</div>
        </div>
      </div>
      <div class="quiet-footer">
        <button class="quiet-next" id="quiet-next-btn">${isLast ? '静かに終える' : '次へ　→'}</button>
        <div class="quiet-progress">${index + 1} / ${QUIET_STAGES.length}</div>
      </div>
    </div>`;

  document.getElementById('quiet-close-btn').addEventListener('click', closeQuietTime);
  document.getElementById('quiet-next-btn').addEventListener('click', () => {
    if (isLast) { closeQuietTime(); } else { renderQuietStage(index + 1); }
  });
  document.getElementById('quiet-sound-btn').addEventListener('click', toggleQuietSound);

  // 呼吸のステージ：4-4-4-4のラベルを自動でめぐらせる
  if (stage.breathing) {
    const label = document.getElementById('quiet-breath-label');
    let i = 0;
    label.textContent = BREATH_LABELS[0];
    quietBreathTimer = setInterval(() => {
      i = (i + 1) % BREATH_LABELS.length;
      label.textContent = BREATH_LABELS[i];
    }, 4000);
  }
}

function openQuietTime() {
  closeMenu();
  renderQuietStage(0);
}

breathingBtn.addEventListener('click', openQuietTime);
