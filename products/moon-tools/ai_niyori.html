<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛により | サージ・カヒリ・キング</title>
<style>
  :root {
    --bg: #0a0612;
    --pink: #d4608a;
    --pink-l: #f0a0c0;
    --gold: #c9a84c;
    --gold-l: #e8c96a;
    --cream: #f5eed8;
    --teal: #4ab8c8;
    --dim: rgba(245,238,216,0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* オーロラ */
  .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .ab {
    position: absolute; border-radius: 50%;
    filter: blur(90px); opacity: 0.08;
    animation: am var(--d,20s) ease-in-out infinite alternate;
  }
  .ab:nth-child(1){width:500px;height:400px;background:#d4608a;top:-10%;left:-10%;--d:18s;}
  .ab:nth-child(2){width:400px;height:400px;background:#6090e0;bottom:-15%;right:-10%;--d:24s;}
  .ab:nth-child(3){width:300px;height:250px;background:#c9a84c;top:45%;left:35%;--d:14s;}
  @keyframes am {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px,25px) scale(1.12); }
  }

  .wrap { position: relative; z-index: 1; max-width: 600px; width: 100%; }

  /* ヘッダー */
  .heart {
    text-align: center; font-size: 3.5rem; margin-bottom: 16px;
    animation: pulse 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(212,96,138,0.6));
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(212,96,138,0.6)); }
    50%      { transform: scale(1.08); filter: drop-shadow(0 0 40px rgba(212,96,138,0.9)); }
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    letter-spacing: .14em;
    color: var(--pink-l);
    text-shadow: 0 0 30px rgba(212,96,138,0.5);
    margin-bottom: 6px;
  }
  .author {
    text-align: center;
    font-size: .82rem;
    color: var(--dim);
    letter-spacing: .2em;
    margin-bottom: 36px;
  }

  /* 本文 */
  .text-body {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,96,138,0.2);
    border-radius: 18px;
    padding: 28px 32px;
    margin-bottom: 24px;
    line-height: 2.4;
  }
  .sentence {
    display: inline;
    padding: 1px 3px;
    border-radius: 4px;
    transition: background .3s, color .3s;
  }
  .sentence.active {
    background: rgba(212,96,138,0.22);
    color: var(--pink-l);
    text-shadow: 0 0 15px rgba(212,96,138,0.4);
  }
  .section-block {
    display: block;
    margin-bottom: 1.4rem;
    padding: 0.8rem 1rem;
    border-radius: 10px;
    border-left: 3px solid transparent;
    transition: all 0.4s;
    line-height: 2.0;
  }
  .sec-num {
    display: inline-block;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 0.7rem;
    color: var(--gold);
    margin-right: 0.5rem;
    opacity: 0.6;
  }
  .sentence.done { color: var(--dim); }

  /* ハワイ語セクション */
  .hawaii-box {
    background: rgba(74,184,200,0.06);
    border: 1px solid rgba(74,184,200,0.25);
    border-radius: 14px;
    padding: 22px 28px;
    margin-bottom: 24px;
    text-align: center;
  }
  .hawaii-haw {
    font-size: 1.15rem;
    color: var(--teal);
    letter-spacing: .1em;
    margin-bottom: 8px;
    font-style: italic;
  }
  .hawaii-ja {
    font-size: .9rem;
    color: var(--dim);
    line-height: 1.9;
  }
  .hawaii-box.active {
    background: rgba(74,184,200,0.14);
    border-color: rgba(74,184,200,0.5);
  }
  .hawaii-box.active .hawaii-haw { color: #7de8f8; text-shadow: 0 0 20px rgba(74,184,200,0.6); }
  .hawaii-box.active .hawaii-ja  { color: var(--cream); }

  /* コントロール */
  .controls {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    margin-bottom: 10px;
  }
  .speed-row {
    display: flex; align-items: center; gap: 10px;
    font-size: .78rem; color: var(--dim);
  }
  .speed-row input[type=range] { width: 130px; accent-color: var(--pink); }

  .btn-play {
    width: 76px; height: 76px; border-radius: 50%;
    border: 2px solid var(--pink);
    background: rgba(212,96,138,0.1);
    color: var(--pink-l); font-size: 1.9rem;
    cursor: pointer; transition: all .25s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(212,96,138,0.2);
  }
  .btn-play:hover { background: rgba(212,96,138,0.22); box-shadow: 0 0 40px rgba(212,96,138,0.4); }
  .btn-play:active { transform: scale(.94); }

  .btn-row { display: flex; gap: 12px; }
  .btn-sm {
    padding: 8px 18px; border-radius: 18px;
    border: 1px solid rgba(212,96,138,0.35);
    background: rgba(212,96,138,0.07);
    color: var(--pink-l); font-size: .8rem;
    cursor: pointer; transition: all .2s;
  }
  .btn-sm:hover { background: rgba(212,96,138,0.18); }

  .status {
    font-size: .78rem; color: var(--dim);
    letter-spacing: .08em; min-height: 20px; text-align: center;
  }
  .progress {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden; margin-top: 4px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    width: 0%; transition: width .4s;
    border-radius: 2px;
  }

  .footer { margin-top: 40px; text-align: center; font-size: .7rem; color: rgba(245,238,216,0.25); letter-spacing: .12em; }
.back-link{display:inline-block;margin:0 0 14px;font-size:.75rem;color:#e8c96a;text-decoration:none;font-weight:700;letter-spacing:.05em;opacity:.85;}
.back-link:hover{opacity:1;text-decoration:underline;}
</style>
</head>
<body>
<!-- パスワード保護 -->
<div id="pwOverlay" style="
  position:fixed;inset:0;z-index:9999;
  background:#080b18;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
">
  <div style="font-size:2.5rem;margin-bottom:20px;">🔒</div>
  <div style="color:#f5eed8;font-size:1rem;letter-spacing:.15em;margin-bottom:24px;">パスワードを入力してください</div>
  <input id="pwInput" type="password" placeholder="password"
    style="background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.4);
    border-radius:10px;padding:12px 20px;color:#f5eed8;font-size:1rem;
    text-align:center;outline:none;letter-spacing:.2em;width:220px;"
    onkeydown="if(event.key==='Enter')checkPw()">
  <div id="pwErr" style="color:#d4608a;font-size:.78rem;margin-top:10px;height:18px;"></div>
  <button onclick="checkPw()" style="
    margin-top:14px;background:rgba(201,168,76,0.15);
    border:1px solid rgba(201,168,76,0.5);border-radius:10px;
    color:#e8c96a;padding:10px 32px;font-size:.9rem;cursor:pointer;
    letter-spacing:.1em;">開く</button>
</div>
<script>
(function(){
  // セッション中は再入力不要
  if(sessionStorage.getItem('auth')==='ok'){
    document.getElementById('pwOverlay').style.display='none';
  } else {
    document.getElementById('pwInput').focus();
  }
})();
function checkPw(){
  const v=document.getElementById('pwInput').value;
  if(v==='goh'){
    sessionStorage.setItem('auth','ok');
    document.getElementById('pwOverlay').style.display='none';
  } else {
    document.getElementById('pwErr').textContent='パスワードが違います';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>document.getElementById('pwErr').textContent='',2000);
  }
}
</script>

<canvas id="c"></canvas>
<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>

<div class="wrap">
  <a class="back-link" href="moon_tools.html">← 月読みツール集へ戻る</a>
  <div class="heart">💗</div>
  <h1>愛 に よ り</h1>
  <p class="author">サージ・カヒリ・キング</p>

  <!-- 本文 -->
  <div class="text-body" id="textBody"></div>

  <!-- ハワイ語 -->
  <div class="hawaii-box" id="hawaiiBox">
    <div class="hawaii-haw">He punawai kahe wale ke aloha</div>
    <div class="hawaii-ja">愛は無限に溢れる泉である<br>愛には境がなく、誰でも手に得られる</div>
  </div>

  <!-- 音声（外部MP3） -->
  <audio id="bgAudio" preload="auto">
    <source src="ai_niyori.mp3" type="audio/mpeg">
  </audio>

  <!-- コントロール -->
  <div class="controls">
    <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
    <div class="btn-row">
      <button class="btn-sm" onclick="restart()">↺ はじめから</button>
      <button class="btn-sm" onclick="stopAll()">■ 停止</button>
    </div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status" id="status">タップして朗読開始</div>
  </div>

  <div class="footer">愛泉の杜 Spirit Tools 🌙</div>
</div>

<script>
// ── 星 ──────────────────────────────────────────────────────
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let stars=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
function initStars(){stars=[];for(let i=0;i<100;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.3+.2,a:Math.random(),da:(Math.random()*.005+.002)*(Math.random()>.5?1:-1)});}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,248,230,${Math.max(0,Math.min(1,s.a))})`;ctx.fill();});requestAnimationFrame(draw);}
resize();initStars();draw();
window.addEventListener('resize',()=>{resize();initStars();});

// ── 朗読テキスト（文単位で分割）──────────────────────────────
const SECTIONS = [
  { num:'1', text: '愛は本当に不思議な事です。人は愛を感じると言う時、それを何を意味するかを知ってる様に見えます。しかし、自分が感じてる事を明らかに表現出来るのは少数でしょう。愛を表し難い原因は愛という言葉の使い方が混乱しているからだと思います。愛はあまりにも頻繁に使われ、それも誤って使われてきたので、多くの人は愛ではない事を感じていても愛を感じているのだと思うのです。一つに、愛は願望ではなく、願望は愛の産物ではありません。願望の対象が同時に愛の対象であるとしても、愛と願望は全く別です。' },
  { num:'2', text: '愛を説明するには、理解、受容、そして与える事という三つのキーワードがあります。理解が愛につながるかもしれませんが、理解は愛そのものではありません。それで、理解は、他の二つのキーワードほど重要ではありません。しかし、多くの場合、受容の前には理解が生じます。恐れを克服するには、知らなかった事を知る必要があります。愛が欠如するのは、非常に恐れがあるからです。恐れは憎しみの生みの親で、否定と自己中心を引き起こし、愛の対極です。無知は恐れの生みの親だと言われています。理解が無知にとって代わると、恐れが消えて愛が生じます。' },
  { num:'3', text: 'しかし、愛は招き入れなければ生じません。愛は行動ですから、愛する側が行動しなくては愛は動きません。私は受容が愛のキーワードの一つだと述べましたが、受容は無関心に過ぎない無視別の受け入れではありません。扉を開けて入って来るのを招く受容を、私は意味します。客が中に入ると、愛のもう一つの側面である与えるという行動が現れます。物を与えるのではなく、無条件で自分を差し出すのです。愛は何か見返りを求めるのではなく、また誰かを喜ばす為でもなく、愛自体の故に愛するで最高なのです。' },
  { num:'4', text: '理解せずに喜ばすだけの愛は謝っていて空っぽです。お粗末な満足は得られるでしょうが、相手の気まぐれに振り回されます。心が、愛で満たされているなら、愛する人が居ないはずありません。輝く花に、蜂が惹きつけられる様に、人はあなたに惹きつけられるでしょう。人を愛して愛されるには、大きな秘密があります。蛇口がすでに水で満たされていなければ、蛇口をひねってみても水は出てきません。自分を受け入れて、自分自身を与えることを知っていなければ、同様な事を他の人にすることは非常に困難です。' },
  { num:'5', text: '自分を受け入れるとは、自分の長所短所の全てを知り、それが自分の持ち味であるのに気づき、前に進むのを決意し、長所短所に働きかけるのを意味します。愛が提供するのは、怠慢ではなく世話や関心であり、長所を促進し、短所を改善する試みです。自分に自分自身を与える事は、自分を愛する事で、自分が愛に値するのを受け入れる事でもあります。自分がした事や他人からの扱われ方のせいで、多くの人は愛に値しないと思っています。これは大きな間違いです。' },
  { num:'6', text: 'あなたは宇宙の子であり、木々や星たちと同様に、あなたはここに存在する権利を有しています。あなたは存在しているだけで、愛される値があるのです。あなたがした事、誰かがあなたに行った事は、この事実を変えられません。古代のハワイ人は次の様に美しい表現をしています。He punawai kahe wale ke aloha ── 愛は無限に溢れる泉である。愛には境がなく、誰でも手に得られる。' },
];
const TOTAL = SECTIONS.length;
// ハワイ語は最後に別扱い

// ── DOM生成 ─────────────────────────────────────────────────
const textBody = document.getElementById('textBody');
SECTIONS.forEach((sec, i) => {
  const div = document.createElement('div');
  div.className = 'sentence section-block';
  div.dataset.i = i;
  div.innerHTML = '<span class="sec-num">' + sec.num + '</span>' + sec.text;
  textBody.appendChild(div);
  if (i < SECTIONS.length - 1) textBody.appendChild(document.createElement('br'));
});

// ── タイムスタンプ（秒）── 実測後に調整してください ──
// 210秒の音声を6セクションに分割（仮値）
const TIMESTAMPS = [0.5, 35.0, 72.0, 110.0, 148.0, 178.0];

// ── 状態 ─────────────────────────────────────────────────────
let currentIdx = -1;
let playing = false;
let timerInterval = null;

function highlight(i) {
  currentIdx = i;
  document.querySelectorAll('.sentence').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
    el.classList.toggle('done', idx < i);
  });
  // スクロール
  const el = document.querySelector(`.sentence[data-i="${i}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // ステータス
  document.getElementById('status').textContent = 'Section ' + (i + 1) + ' / ' + TOTAL;
}

function clearHighlight() {
  document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active','done'));
  document.getElementById('progressBar').style.width = '0%';
}

// ── 再生ロジック ──────────────────────────────────────────────
function startAudio() {
  const audio = document.getElementById('bgAudio');
  const btn   = document.getElementById('btnPlay');
  btn.disabled = true;
  audio.pause();
  audio.currentTime = 0;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  function doPlay() {
    btn.disabled = false;
    const p = audio.play();
    if (p !== undefined) {
      p.then(() => startTimer())
       .catch(e => {
         document.getElementById('status').textContent = '⚠ 再生エラー: ' + e.name;
         playing = false; btn.textContent = '▶'; btn.disabled = false;
       });
    } else { startTimer(); }
  }

  if (audio.readyState >= 3) {
    doPlay();
  } else {
    document.getElementById('status').textContent = '読み込み中...';
    audio.oncanplaythrough = () => { audio.oncanplaythrough = null; doPlay(); };
    audio.load();
  }
  document.getElementById('status').textContent = '再生中...';
}

function startTimer() {
  const audio = document.getElementById('bgAudio');
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!playing) { clearInterval(timerInterval); timerInterval = null; return; }
    const t = audio.currentTime;
    // 現在時刻に対応するセクション
    let cur = -1;
    for (let i = TIMESTAMPS.length - 1; i >= 0; i--) {
      if (t >= TIMESTAMPS[i]) { cur = i; break; }
    }
    if (cur >= 0 && cur !== currentIdx) highlight(cur);
    // プログレスバー更新
    if (audio.duration > 0) {
      document.getElementById('progressBar').style.width =
        Math.round((t / audio.duration) * 100) + '%';
    }
    // 終了チェック
    if (audio.ended || (audio.duration > 0 && t >= audio.duration - 0.2)) {
      clearInterval(timerInterval); timerInterval = null;
      playing = false;
      document.getElementById('btnPlay').textContent = '▶';
      document.getElementById('status').textContent = '✦ Mahalo nui loa ✦';
      setTimeout(clearHighlight, 3000);
    }
  }, 100);
}

function stopAudio() {
  const audio = document.getElementById('bgAudio');
  if (audio) { audio.pause(); }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('btnPlay').disabled = false;
}

function togglePlay() {
  if (playing) {
    stopAll();
  } else {
    playing = true;
    document.getElementById('btnPlay').textContent = '⏸';
    startAudio();
  }
}

function stopAll() {
  playing = false;
  stopAudio();
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('status').textContent = '停止中 — 続きから再生できます';
}

function restart() {
  stopAll();
  clearHighlight();
  currentIdx = -1;
  document.getElementById('status').textContent = 'タップして朗読開始';
}

document.addEventListener('visibilitychange', () => { if (document.hidden && playing) stopAll(); });
</script>
</body>
</html>
