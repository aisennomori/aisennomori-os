<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>月読みカード | 愛泉の杜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0a1620;
    --navy:#102232;
    --navy-card:#132a3c;
    --gold:#d4af6a;
    --gold-soft:#e8cd97;
    --moonlight:#f3efe4;
    --ink-soft:#b9c6cf;
    --teal:#4c7a78;
    --divider:rgba(212,175,106,0.22);
    --shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(ellipse at 50% -10%, #17324a 0%, var(--navy-deep) 55%, #060d14 100%);
    color:var(--moonlight);
    font-family:'Zen Kaku Gothic New', sans-serif;
    overflow:hidden;
  }
  /* ambient stars */
  #stars{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(255,255,255,0.35) 0, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.3) 0, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.4) 0, transparent 100%),
      radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,0.3) 0, transparent 100%);
    background-repeat:no-repeat;
    opacity:0.8;
  }

  .app{
    position:relative;z-index:1;
    height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px;
  }

  /* top bar */
  .topbar{
    width:100%;max-width:460px;
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 4px 14px;
    flex-shrink:0;
  }
  .brand{
    font-size:11px;letter-spacing:0.18em;color:var(--ink-soft);
    text-transform:uppercase;
  }
  .counter-wrap{display:flex;align-items:center;gap:8px;}
  .phase-glyph{
    width:20px;height:20px;border-radius:50%;position:relative;
    overflow:hidden;background:var(--navy-deep);
    border:1px solid rgba(212,175,106,0.55);
    flex-shrink:0;
  }
  .phase-glyph::after{
    content:'';position:absolute;inset:0;border-radius:50%;
    background:var(--gold);
    transform:translateX(var(--dx, 0px));
  }
  .phase-glyph.emoji-mode{
    display:flex;align-items:center;justify-content:center;
    font-size:13px;background:none;border-color:transparent;
  }
  .phase-glyph.emoji-mode::after{display:none;}
  .counter{
    font-family:'Shippori Mincho', serif;
    font-size:14px;letter-spacing:0.06em;color:var(--gold-soft);
    font-variant-numeric:tabular-nums;
  }
  .counter b{color:var(--moonlight);font-weight:700;}

  /* stage: card + arrows */
  .stage{
    position:relative;
    width:100%;max-width:460px;
    flex:1 1 auto;
    min-height:0;
    display:flex;align-items:center;justify-content:center;
  }

  .nav-btn{
    position:absolute;top:50%;transform:translateY(-50%);
    width:42px;height:42px;border-radius:50%;
    background:rgba(19,42,60,0.7);
    border:1px solid var(--divider);
    color:var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:5;
    transition:background .2s ease, transform .2s ease;
    backdrop-filter:blur(4px);
  }
  .nav-btn:hover{background:rgba(212,175,106,0.18);}
  .nav-btn:active{transform:translateY(-50%) scale(0.92);}
  .nav-btn.prev{left:-4px;}
  .nav-btn.next{right:-4px;}
  .nav-btn svg{width:18px;height:18px;}

  @media (min-width:560px){
    .nav-btn.prev{left:-56px;}
    .nav-btn.next{right:-56px;}
  }

  /* card */
  .card-viewport{
    width:100%;height:100%;
    overflow:hidden;
    border-radius:22px;
    position:relative;
  }
  .card-track{
    display:flex;
    height:100%;
    transition:transform .45s cubic-bezier(.65,.05,.36,1);
  }
  .card{
    flex:0 0 100%;
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    background:linear-gradient(180deg, var(--navy-card) 0%, var(--navy) 100%);
    border:1px solid rgba(212,175,106,0.15);
    border-radius:22px;
    box-shadow:var(--shadow);
    scrollbar-width:thin;
    scrollbar-color:rgba(212,175,106,0.35) transparent;
  }
  .card::-webkit-scrollbar{width:5px;}
  .card::-webkit-scrollbar-thumb{background:rgba(212,175,106,0.3);border-radius:3px;}

  .card-inner{padding:20px 18px 26px;}

  .card-header{
    display:flex;flex-direction:column;
    margin-bottom:14px;
  }

  .header-top-row{
    display:flex;align-items:center;gap:12px;
    margin-bottom:12px;
  }

  .moon-phase-thumb{
    flex-shrink:0;
  }
  .moon-phase-thumb img{
    width:84px;height:84px;object-fit:contain;display:block;
  }

  .day-name-block{
    flex:1;min-width:0;
  }

  .meta-tags-stack{
    display:flex;flex-direction:column;align-items:flex-end;
    gap:5px;flex-shrink:0;
    margin-left:auto;
    align-self:flex-start;
  }

  .media-pending{
    width:84px;height:84px;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);
    background:
      radial-gradient(circle at 50% 40%, rgba(212,175,106,0.12), transparent 60%),
      linear-gradient(135deg,#1c3448,#0c1b28);
    border-radius:14px;
  }
  .media-pending svg{width:22px;height:22px;opacity:0.7;}

  .day-tag{
    display:block;
    font-size:12.5px;font-weight:600;letter-spacing:0.1em;color:var(--gold);
    margin-bottom:4px;
  }

  .name-en{
    font-family:'Shippori Mincho', serif;
    font-size:23px;font-weight:700;
    color:var(--moonlight);
    margin:0 0 2px;
    line-height:1.15;
  }
  .kana-line{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:12.5px;font-weight:400;
    color:var(--ink-soft);
    margin:0;
    letter-spacing:0.03em;
  }
  .meaning-line{
    font-size:16px;color:var(--moonlight);
    margin:0 0 3px;
    font-weight:700;
    line-height:1.4;
    text-align:left;
  }
  .meta-tag{
    font-size:13px;font-weight:600;color:var(--gold-soft);
    background:rgba(212,175,106,0.1);
    border:1px solid rgba(212,175,106,0.28);
    padding:3px 10px;border-radius:20px;
    white-space:nowrap;
  }

  .divider{
    height:1px;
    background:linear-gradient(90deg, var(--divider), transparent 85%);
    margin:14px 0;
  }

  .sections-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
  }
  .detail-pending{
    padding:16px 14px;text-align:center;
    color:var(--ink-soft);font-size:11.5px;line-height:1.7;
    border:1px dashed rgba(212,175,106,0.32);
    border-radius:13px;
  }
  .section{
    background:rgba(212,175,106,0.05);
    border:1px solid rgba(212,175,106,0.16);
    border-radius:13px;
    padding:10px 11px;
  }
  .section--action{ background:rgba(212,175,106,0.09); border-color:rgba(212,175,106,0.22); }
  .section--trait{ background:rgba(90,150,148,0.12); border-color:rgba(90,150,148,0.28); }
  .section--health{ background:rgba(196,105,105,0.11); border-color:rgba(196,105,105,0.26); }
  .section--relationship{ background:rgba(120,145,205,0.11); border-color:rgba(120,145,205,0.26); }
  .section--career{ background:rgba(150,158,178,0.10); border-color:rgba(150,158,178,0.24); }
  .section--color{ background:rgba(185,120,175,0.11); border-color:rgba(185,120,175,0.26); }

  .section--action .section-head svg,
  .section--action .section-head h3{ color:#d4af6a; }
  .section--trait .section-head svg,
  .section--trait .section-head h3{ color:#7fc4bf; }
  .section--health .section-head svg,
  .section--health .section-head h3{ color:#e08d8d; }
  .section--relationship .section-head svg,
  .section--relationship .section-head h3{ color:#a3b8ee; }
  .section--career .section-head svg,
  .section--career .section-head h3{ color:#c3c9db; }
  .section--color .section-head svg,
  .section--color .section-head h3{ color:#dd9ed1; }

  .mood-tile{
    display:flex;align-items:center;justify-content:flex-start;
    padding:4px;
  }
  .mood-tile img{width:76px;height:76px;object-fit:cover;border-radius:10px;display:block;}

  .section-head{
    display:flex;align-items:center;gap:5px;
    margin-bottom:6px;
  }
  .section-head svg{width:13px;height:13px;color:var(--gold);flex-shrink:0;}
  .section-head h3{
    font-size:12px;letter-spacing:0.05em;
    color:var(--gold);
    margin:0;font-weight:700;
    text-transform:uppercase;
  }
  .section-list{
    list-style:none;margin:0;padding:0;
  }
  .section-list li{
    font-size:10.8px;line-height:1.5;
    color:var(--ink-soft);
    padding-left:9px;position:relative;
    margin-bottom:3px;
  }
  .section-list li:last-child{margin-bottom:0;}
  .section-list li::before{
    content:'';position:absolute;left:0;top:0.55em;
    width:3px;height:3px;border-radius:50%;
    background:var(--gold);opacity:0.75;
  }

  .pending-card{
    height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 30px;
    gap:16px;
  }
  .pending-card svg{width:46px;height:46px;color:var(--gold);opacity:0.8;}
  .pending-card h2{
    font-family:'Shippori Mincho', serif;
    font-size:20px;margin:0;color:var(--moonlight);
  }
  .pending-card p{
    font-size:13px;color:var(--ink-soft);line-height:1.8;margin:0;max-width:280px;
  }
  .pending-card .day-tag{margin-bottom:4px;}

  /* bottom hint */
  .bottombar{
    width:100%;max-width:460px;
    display:flex;align-items:center;justify-content:center;
    gap:6px;
    padding-top:14px;flex-shrink:0;
  }
  .dot{
    width:5px;height:5px;border-radius:50%;
    background:rgba(212,175,106,0.25);
    transition:background .25s ease, transform .25s ease;
  }
  .dot.active{background:var(--gold);transform:scale(1.4);}

  .swipe-hint{
    font-size:11px;color:var(--ink-soft);
    text-align:center;letter-spacing:0.06em;
    opacity:0.7;
    padding-top:6px;
  }

  @media (prefers-reduced-motion: reduce){
    .card-track{transition:none;}
  }
</style>
</head>
<body>
<div id="stars"></div>
<div class="app">

  <div class="topbar">
    <div class="brand">月読みカード ・ 愛泉の杜</div>
    <div class="counter-wrap">
      <div class="phase-glyph" id="phaseGlyph"></div>
      <div class="counter"><b id="dayNow">01</b> / 30</div>
    </div>
  </div>

  <div class="stage">
    <button class="nav-btn prev" id="prevBtn" aria-label="前のMOON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <div class="card-viewport">
      <div class="card-track" id="cardTrack"></div>
    </div>

    <button class="nav-btn next" id="nextBtn" aria-label="次のMOON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <div class="bottombar">
    <div id="dots" style="display:flex;gap:6px;"></div>
  </div>
  <div class="swipe-hint">← スワイプ / 矢印キーで、前後のMOONへ →</div>

</div>

const SECTION_CLASS = {
  action: 'section--action',
  trait: 'section--trait',
  health: 'section--health',
  relationship: 'section--relationship',
  career: 'section--career',
  color: 'section--color',
};

function buildSection(iconName, label, text){
  if(!text) return '';
  const lines = String(text).split('\n').map(s => s.trim()).filter(Boolean);
  const items = lines.map(l => `<li>${escapeHtml(l)}</li>`).join('');
  return `
    <div class="section ${SECTION_CLASS[iconName] || ''}">
      <div class="section-head">${sectionIcon(iconName)}<h3>${label}</h3></div>
      <ul class="section-list">${items}</ul>
    </div>`;
}

const ELEMENT_LABELS = { '🌬':'風', '🌊':'水', '🌍':'地', '🔥':'火' };

function metaTagsInline(rec){
  const tags = [];
  if(rec.element){
    const label = ELEMENT_LABELS[rec.element] || '';
    tags.push(`<span class="meta-tag">${rec.element} ${label}</span>`);
  }
  if(rec.kami){
    tags.push(`<span class="meta-tag">${escapeHtml(rec.kami)}</span>`);
  }
  return tags.join('');
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

        ${buildSection('health','健康', rec.health)}
        ${buildSection('relationship','人間関係', rec.relationship)}
        ${buildSection('career','職業', rec.career)}
        ${buildSection('color','ラッキーカラー', rec.color)}
        ${moodThumb}
      </div>`
    : `<div class="detail-pending">この夜の詳しい物語（行動・特徴・健康など）は、近日公開予定です。</div>`;

  return `
    <div class="card-inner">
      <div class="card-header">
        <div class="header-top-row">
          ${moonPhaseThumb}
          <div class="day-name-block">
            <span class="day-tag">DAY ${dayPadded}</span>
            <h1 class="name-en">${escapeHtml(rec.name_en)}</h1>
            ${rec.kana ? `<p class="kana-line">${escapeHtml(rec.kana)}</p>` : ''}
          </div>
          ${metaStack}
        </div>
        ${meaningLines}
      </div>
      <div class="divider"></div>
      ${body}
    </div>`;
}

function render(){
  track.innerHTML = MOON_DATA.map(rec => `<div class="card">${cardHTML(rec)}</div>`).join('');
  buildDots();
  goTo(0, false);
}

function buildDots(){
  dotsEl.innerHTML = MOON_DATA.map((_, i) => `<div class="dot" data-i="${i}"></div>`).join('');
}

function updateDots(){
  const dots = dotsEl.querySelectorAll('.dot');
  // show a sliding window of dots around current position to avoid 30 crammed dots
  const windowSize = 9;
  let start = Math.max(0, Math.min(current - Math.floor(windowSize/2), TOTAL - windowSize));
  dots.forEach((d, i) => {
    const inWindow = i >= start && i < start + windowSize;
    d.style.display = inWindow ? 'block' : 'none';
    d.classList.toggle('active', i === current);
  });
}

function updatePhaseGlyph(rec){
  if(rec.phase_icon){
    phaseGlyph.classList.add('emoji-mode');
    phaseGlyph.textContent = rec.phase_icon;
    return;
  }
  phaseGlyph.classList.remove('emoji-mode');
  phaseGlyph.textContent = '';
  const day = rec.day;
  const t = (day - 1) / 29; // 0 = new moon, 0.5 = full moon, 1 = new moon again
  const distFromFull = Math.abs(t - 0.5) * 2; // 0 at full, 1 at new
  const size = 20;
  const direction = t <= 0.5 ? -1 : 1; // waxing shifts one way, waning the other
  const dx = direction * distFromFull * size;
  phaseGlyph.style.setProperty('--dx', `${dx.toFixed(1)}px`);
}

function goTo(index, animate = true){
  current = ((index % TOTAL) + TOTAL) % TOTAL;
  track.style.transition = animate ? '' : 'none';
  track.style.transform = `translateX(-${current * 100}%)`;
  if(!animate){
    // force reflow then restore transition
    void track.offsetHeight;
    track.style.transition = '';
  }
  dayNowEl.textContent = String(current + 1).padStart(2, '0');
  updatePhaseGlyph(MOON_DATA[current]);
  updateDots();
  const card = track.children[current];
  if(card) card.scrollTop = 0;
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') goTo(current - 1);
  if(e.key === 'ArrowRight') goTo(current + 1);
});

// swipe support
let touchStartX = null;
let touchStartY = null;
const viewport = document.querySelector('.card-viewport');

viewport.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

viewport.addEventListener('touchend', (e) => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
  touchStartX = null;
  touchStartY = null;
}, {passive:true});

dotsEl.addEventListener('click', (e) => {
  const dot = e.target.closest('.dot');
  if(!dot) return;
  goTo(parseInt(dot.dataset.i, 10));
});

render();

</script>
</body>
</html>
