<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>月読みカード | 愛泉の杜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0a1620;
    --navy:#102232;
    --navy-card:#132a3c;
    --gold:#d4af6a;
    --gold-soft:#e8cd97;
    --moonlight:#f3efe4;
    --ink-soft:#b9c6cf;
    --teal:#4c7a78;
    --divider:rgba(212,175,106,0.22);
    --shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:radial-gradient(ellipse at 50% -10%, #17324a 0%, var(--navy-deep) 55%, #060d14 100%);
    color:var(--moonlight);
    font-family:'Zen Kaku Gothic New', sans-serif;
    overflow:hidden;
  }
  /* ambient stars */
  #stars{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(255,255,255,0.35) 0, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.3) 0, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.4) 0, transparent 100%),
      radial-gradient(1px 1px at 45% 40%, rgba(255,255,255,0.3) 0, transparent 100%);
    background-repeat:no-repeat;
    opacity:0.8;
  }

  .app{
    position:relative;z-index:1;
    height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px;
  }

  /* top bar */
  .topbar{
    width:100%;max-width:460px;
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 4px 14px;
    flex-shrink:0;
  }
  .brand{
    font-size:11px;letter-spacing:0.18em;color:var(--ink-soft);
    text-transform:uppercase;
  }
  .counter-wrap{display:flex;align-items:center;gap:8px;}
  .phase-glyph{
    width:20px;height:20px;border-radius:50%;position:relative;
    overflow:hidden;background:var(--navy-deep);
    border:1px solid rgba(212,175,106,0.55);
    flex-shrink:0;
  }
  .phase-glyph::after{
    content:'';position:absolute;inset:0;border-radius:50%;
    background:var(--gold);
    transform:translateX(var(--dx, 0px));
  }
  .counter{
    font-family:'Shippori Mincho', serif;
    font-size:14px;letter-spacing:0.06em;color:var(--gold-soft);
    font-variant-numeric:tabular-nums;
  }
  .counter b{color:var(--moonlight);font-weight:700;}

  /* stage: card + arrows */
  .stage{
    position:relative;
    width:100%;max-width:460px;
    flex:1 1 auto;
    min-height:0;
    display:flex;align-items:center;justify-content:center;
  }

  .nav-btn{
    position:absolute;top:50%;transform:translateY(-50%);
    width:42px;height:42px;border-radius:50%;
    background:rgba(19,42,60,0.7);
    border:1px solid var(--divider);
    color:var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:5;
    transition:background .2s ease, transform .2s ease;
    backdrop-filter:blur(4px);
  }
  .nav-btn:hover{background:rgba(212,175,106,0.18);}
  .nav-btn:active{transform:translateY(-50%) scale(0.92);}
  .nav-btn.prev{left:-4px;}
  .nav-btn.next{right:-4px;}
  .nav-btn svg{width:18px;height:18px;}

  @media (min-width:560px){
    .nav-btn.prev{left:-56px;}
    .nav-btn.next{right:-56px;}
  }

  /* card */
  .card-viewport{
    width:100%;height:100%;
    overflow:hidden;
    border-radius:22px;
    position:relative;
  }
  .card-track{
    display:flex;
    height:100%;
    transition:transform .45s cubic-bezier(.65,.05,.36,1);
  }
  .card{
    flex:0 0 100%;
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    background:linear-gradient(180deg, var(--navy-card) 0%, var(--navy) 100%);
    border:1px solid rgba(212,175,106,0.15);
    border-radius:22px;
    box-shadow:var(--shadow);
    scrollbar-width:thin;
    scrollbar-color:rgba(212,175,106,0.35) transparent;
  }
  .card::-webkit-scrollbar{width:5px;}
  .card::-webkit-scrollbar-thumb{background:rgba(212,175,106,0.3);border-radius:3px;}

  .card-inner{padding:26px 26px 34px;}

  .media-frame{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:20px;
    background:linear-gradient(135deg,#1c3448,#0c1b28);
    border:1px solid rgba(212,175,106,0.2);
  }
  .media-frame img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .media-frame .ring{
    position:absolute;inset:8px;border-radius:12px;
    border:1px solid rgba(243,239,228,0.15);
    pointer-events:none;
  }
  .media-pending{
    width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--ink-soft);
    background:
      radial-gradient(circle at 50% 40%, rgba(212,175,106,0.12), transparent 60%),
      linear-gradient(135deg,#1c3448,#0c1b28);
  }
  .media-pending svg{width:34px;height:34px;opacity:0.75;}
  .media-pending span{font-size:12px;letter-spacing:0.08em;}

  .day-tag{
    display:inline-block;
    font-size:11px;letter-spacing:0.14em;color:var(--gold);
    border:1px solid var(--divider);
    padding:3px 10px;border-radius:20px;
    margin-bottom:12px;
  }

  .name-en{
    font-family:'Shippori Mincho', serif;
    font-size:32px;font-weight:700;
    color:var(--moonlight);
    margin:0 0 4px;
    line-height:1.2;
  }
  .meaning{
    font-size:15px;color:var(--gold-soft);
    margin:0 0 10px;
    font-weight:500;
  }
  .calendar-note{
    font-size:12.5px;color:var(--ink-soft);
    margin:0 0 20px;
  }

  .divider{
    height:1px;
    background:linear-gradient(90deg, var(--divider), transparent 85%);
    margin:18px 0;
  }

  .section{margin-bottom:20px;}
  .section:last-child{margin-bottom:0;}
  .section-head{
    display:flex;align-items:center;gap:8px;
    margin-bottom:8px;
  }
  .section-head svg{width:16px;height:16px;color:var(--gold);flex-shrink:0;}
  .section-head h3{
    font-size:12px;letter-spacing:0.12em;
    color:var(--gold);
    margin:0;font-weight:500;
    text-transform:uppercase;
  }
  .section p{
    font-size:13.5px;line-height:1.85;
    color:var(--ink-soft);
    margin:0;
    white-space:pre-line;
  }

  .pending-card{
    height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 30px;
    gap:16px;
  }
  .pending-card svg{width:46px;height:46px;color:var(--gold);opacity:0.8;}
  .pending-card h2{
    font-family:'Shippori Mincho', serif;
    font-size:20px;margin:0;color:var(--moonlight);
  }
  .pending-card p{
    font-size:13px;color:var(--ink-soft);line-height:1.8;margin:0;max-width:280px;
  }
  .pending-card .day-tag{margin-bottom:4px;}

  /* bottom hint */
  .bottombar{
    width:100%;max-width:460px;
    display:flex;align-items:center;justify-content:center;
    gap:6px;
    padding-top:14px;flex-shrink:0;
  }
  .dot{
    width:5px;height:5px;border-radius:50%;
    background:rgba(212,175,106,0.25);
    transition:background .25s ease, transform .25s ease;
  }
  .dot.active{background:var(--gold);transform:scale(1.4);}

  .swipe-hint{
    font-size:11px;color:var(--ink-soft);
    text-align:center;letter-spacing:0.06em;
    opacity:0.7;
    padding-top:6px;
  }

  @media (prefers-reduced-motion: reduce){
    .card-track{transition:none;}
  }
</style>
</head>
<body>
<div id="stars"></div>
<div class="app">

  <div class="topbar">
    <div class="brand">月読みカード ・ 愛泉の杜</div>
    <div class="counter-wrap">
      <div class="phase-glyph" id="phaseGlyph"></div>
      <div class="counter"><b id="dayNow">01</b> / 30</div>
    </div>
  </div>

  <div class="stage">
    <button class="nav-btn prev" id="prevBtn" aria-label="前のMOON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>

    <div class="card-viewport">
      <div class="card-track" id="cardTrack"></div>
    </div>

    <button class="nav-btn next" id="nextBtn" aria-label="次のMOON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>
  </div>

  <div class="bottombar">
    <div id="dots" style="display:flex;gap:6px;"></div>
  </div>
  <div class="swipe-hint">← スワイプ / 矢印キーで、前後のMOONへ →</div>

</div>

<script id="moon-data" type="application/json">
[{"day": 1, "name_en": "Hilo", "meaning": "月の先駆者", "calendar": "古来ハワイ太陰暦　１日目", "action": "独立心が高く自己中心的、想像力豊か　生まれもってのリーダー気質", "trait": "野心が原動力　起業家マインド　冒険心を持って目標を追い求め手に入れる\nクリエイティブで障害を回避して落とし穴を避けることができる　情熱を持って人生を歩む", "health": "幼少期は、感染症　胸　肺　腹部\n成長してからは、頭　目　脚　消化器系\n概ね健康である", "mood": "金色の光が広がる背景。情熱・太陽・王族の象徴。\n右側に柔らかい光の粒が舞っている。", "relationship": "リーダーで子分を従えることを好む\n指示を出して行動を決めたがる\n結婚生活はうまくいきにくい\n相手が妥協してくれるんじゃ無いと衝突する\n受け入れて協力的な人と好ましい", "career": "強い精神力とクリエイティブ知性を刺激する職\n起業家\n最高責任者\nコンサル\n管理職", "color": "黄色\n宇宙の中で日光の意味を持つ\n成功の達成\n勝利\nハワイでは王族の高貴な地位と霊的保護の意味を持つ", "hasImage": true}, {"day": 2, "name_en": "Hoaka", "meaning": "アロハ大使", "calendar": "古来ハワイ太陰暦２日目", "action": "思いやり　礼儀正しい　おもてなしの心　社交的活動　家族や友人を大切にする", "trait": "親切心に溢れている　トラブルや戦いなどを嫌うので直ぐに身を引く\nチャーミングでカリスマ性があり折り合いが上手です　人々に影響を与える力を持っている", "health": "幼少期　熱病　頭痛　吐き気　むかつき\n成長期　不安症　鬱　精神的なストレスで悩まされる傾向　薬物依存にも注意", "mood": "深い海の青。マッコウクジラが泳ぐ神秘的な水中。\n優しさ・献身・深い愛の象徴。", "relationship": "愛情深く従順な配偶者になる\n熱心な親になる\n自分より他人のことを優先してしまう\n思いやり深く同情心を利用されることがある", "career": "豊かな社交性を生かす\nホテル\n旅行\n接客\n広報\n管理職", "color": "アイボリー\nココナッツの花の色\nマッコウ鯨の牙\n牙から彫ったペンダントは霊的な能力開花\nアイボリーの装飾品は伝統的に富やステータスに関連している", "hasImage": true}, {"day": 3, "name_en": "Ku-kahi", "meaning": "ハワイに最初に君臨した神", "calendar": "太陰暦３日目の月", "action": "心底戦士　競争心と人助けの精神　自発的　成功　勝利", "trait": "勝つことに努力を惜しまない　冠を追い続ける\n信念、道徳心がある、家族優先\n仕事、使命が完遂するために取り組む　ブレない", "health": "スタミナ全開、怪我病気の回復が早い、我慢強い\n成長してからは、慢性的な病気にかかったり、運動不足、過度のストレスで重度の障害を患うことがたまにある", "mood": "燃え上がる炎。赤・オレンジの強い光。\n戦士・勝利・情熱の象徴。", "relationship": "異性の心理が分からない\n心の奥深い感情や愛情を表すことが不得意\n結婚した相手には、親の面倒や友人のことも全て面倒見れる", "career": "モチベーションが高い\n行動、エネルギーがある\nリーダー性を発揮できるあらゆる職\n技能訓練、昇給チャンス\nスポーツ、軍隊、政治や企業活動で地位を上げる", "color": "燃え立つ赤\nKu神と霊的に繋がる色\n勇気・勇気・情熱", "hasImage": true}, {"day": 4, "name_en": "Ku-lua", "meaning": "二人で一緒に立つ", "calendar": "太陰暦４日目", "action": "二面性がある　人間的な物質世界と精神性との関係をよく理解している", "trait": "調和、内面の平穏さ、内と外のバランスを大切にする\n矛盾が直ぐに分かり、公平になるように努力を惜しまない\n平等、平和、正義の揺るぎなき提唱者", "health": "首、肩、腕・手、胸、脚の怪我しやすい\n心配性で精神的ストレス、不安、鬱\n成長すると、神経炎、神経痛神経系統の不調に悩まされる", "mood": "正義の女神像（天秤）。\n石像の重厚感と、静かな青白い背景。", "relationship": "長続きする友人関係\n調和の取れた結婚生活\n理性的に思考して衝動を抑え冷静沈着さを保つ能力にかける", "career": "気配り社交性\n機転の早さ\n事務、書記、法律家、営業のプロになる", "color": "ハワイの漁業の神の色\n緋色（ヒイロ）\nこの色をつけた者だけが神に捧げた神殿に近づくことが許される", "hasImage": true}, {"day": 5, "name_en": "Ku-kolu", "meaning": "天と地の支配者", "calendar": "太陰暦５日目", "action": "誠実、開放的、率直　知りたかったことを教えてくれる", "trait": "野心が強く、最高の結果を勝ち取る為に努力を惜しまない\n楽観的で陽気、知人を招いて分かち合う\n人生の局面をうまく抜けられる　打ち勝つ", "health": "正しく食事を摂って、身体、精神、感情のバランスを保つスタイルを維持することにかかっている\n崩れると、高血圧、糖尿病、心臓病、メタボリック障害を引き起こす恐れ", "mood": "黒い月桂冠のシンボル。\n勝利・名誉・王族の血統を示す重厚な黒背景。", "relationship": "忠誠心あり、信頼できる誠実な仲間作り\n愛情と献身に満ちた配偶者となる\n友達との仲も良いので嫉妬されることも", "career": "先進的なことに強い興味を持つ\nテクノロジーの発達に追いついて行くことが喜び\nクリエイティブな仕事、多様性\nコミュニケーション能力\nコンピューター関係の知識を生かした職業", "color": "血の色\n古来ハワイ人が敬意を表す色\n生命力の意味\n王族との血統繋がりを表す色", "hasImage": true}, {"day": 6, "name_en": "Ku-pau", "meaning": "知識は力", "calendar": "古来ハワイ太陰暦６日目", "action": "知識への飽きなき欲求をもち、学んだことを力に変える", "trait": "学び教えて行く教育者、幼い時から個性と態度を確立させる\n正しく教育されると高潔な大人になる\n教えの源", "health": "頭痛やめまい、脳震盪、頭の病気\n顔・目・耳・鼻・喉\n晩年、黄昏時に健忘症など", "mood": "複数の手がパズルを組み立てる写真。\n知識・協働・教育の象徴。\nもう一枚は公園で本を開く写真。", "relationship": "肉体的にも感情的にも幸せな結婚生活\n教育を受けた人との交流を好む\n共通の趣味や共感性の友達と支え合う関係を築く", "career": "教育的技能\n自らの知識能力を生かす職業\nモチベーションが非常に高い\n独立して働く\n学的な資格も追求", "color": "赤い綿模様（しまもよう）\n王族の赤い羽のマントを表す霊的な象徴\n能力開花、大いなる進展、幸運", "hasImage": true}, {"day": 7, "name_en": "Ole-ku-kahi", "meaning": "ALOHAの精神で生きる者", "calendar": "古来ハワイ太陰暦７日目", "action": "性格がよく、おおらかでのんびり\n世俗性を乗り越えて宇宙や高次元と自分との繋がりを大切にする\n浸る思考で過去の成功体験を追想しがち", "trait": "家族優先、日常のありふれた幸せを共有することを好む\nアロハの精神を生きている\n心配事や悩み、愚痴を言わない\n霊的に自制して究極の運命の力を信じている", "health": "健康第一\nノンストレスを送ることが最良と考えているので\n自然治療方法で健康維持を保つ努力を惜しまない\n天候の変化に敏感、喘息、感染症、免疫系等の不調、呼吸器関係", "mood": "霧の森。白い霧が神秘的に漂う。\n高次元・宇宙との繋がりの象徴。", "relationship": "ロマンティストで理想主義者\n配偶者を溺愛\n両親愛\n友人を賞賛", "career": "温かい性格でユーモアのセンス抜群\n笑うことを大切にしている\n情報伝達系\nコミュニケーション能力を使う職\nチームで与えられた仕事を遂行し共通の目標を達成して行く\nチームプレーで成功", "color": "霧のような白\n神々の謎めいた山の領域\n天国の霧\n世俗を乗り越え高次元の自分を神と調和に結びつける", "hasImage": true}, {"day": 8, " }

function cardHTML(rec){
  if(!rec.name_en){
    // pending card (data + image not yet available)
    return `
      <div class="pending-card">
        <span class="day-tag">DAY ${String(rec.day).padStart(2,'0')}</span>
        ${pendingImageSVG()}
        <h2>この MOON の物語は、まもなく届きます</h2>
        <p>このMOONのカードは準備中です。近日中に公開予定ですので、少し先で会いましょう。</p>
      </div>`;
  }

  const mediaBlock = rec.hasImage
    ? `<div class="media-frame"><img src="images/card_${String(rec.day).padStart(2,'0')}.jpg" alt="${escapeHtml(rec.name_en)}の雰囲気" loading="lazy"><div class="ring"></div></div>`
    : `<div class="media-frame"><div class="media-pending">${pendingImageSVG()}<span>image coming soon</span></div></div>`;

  return `
    <div class="card-inner">
      ${mediaBlock}
      <span class="day-tag">DAY ${String(rec.day).padStart(2,'0')}</span>
      <h1 class="name-en">${escapeHtml(rec.name_en)}</h1>
      <p class="meaning">${escapeHtml(rec.meaning || '')}</p>
      <p class="calendar-note">${escapeHtml(rec.calendar || '')}</p>
      <div class="divider"></div>
      ${buildSection('action','行動', rec.action)}
      ${buildSection('trait','特徴', rec.trait)}
      ${buildSection('health','健康', rec.health)}
      ${buildSection('relationship','人間関係', rec.relationship)}
      ${buildSection('career','職業', rec.career)}
      ${buildSection('color','ラッキーカラー', rec.color)}
    </div>`;
}

function render(){
  track.innerHTML = MOON_DATA.map(rec => `<div class="card">${cardHTML(rec)}</div>`).join('');
  buildDots();
  goTo(0, false);
}

function buildDots(){
  dotsEl.innerHTML = MOON_DATA.map((_, i) => `<div class="dot" data-i="${i}"></div>`).join('');
}

function updateDots(){
  const dots = dotsEl.querySelectorAll('.dot');
  // show a sliding window of dots around current position to avoid 30 crammed dots
  const windowSize = 9;
  let start = Math.max(0, Math.min(current - Math.floor(windowSize/2), TOTAL - windowSize));
  dots.forEach((d, i) => {
    const inWindow = i >= start && i < start + windowSize;
    d.style.display = inWindow ? 'block' : 'none';
    d.classList.toggle('active', i === current);
  });
}

function updatePhaseGlyph(day){
  const t = (day - 1) / 29; // 0 = new moon, 0.5 = full moon, 1 = new moon again
  const distFromFull = Math.abs(t - 0.5) * 2; // 0 at full, 1 at new
  const size = 20;
  const direction = t <= 0.5 ? -1 : 1; // waxing shifts one way, waning the other
  const dx = direction * distFromFull * size;
  phaseGlyph.style.setProperty('--dx', `${dx.toFixed(1)}px`);
}

function goTo(index, animate = true){
  current = ((index % TOTAL) + TOTAL) % TOTAL;
  track.style.transition = animate ? '' : 'none';
  track.style.transform = `translateX(-${current * 100}%)`;
  if(!animate){
    // force reflow then restore transition
    void track.offsetHeight;
    track.style.transition = '';
  }
  dayNowEl.textContent = String(current + 1).padStart(2, '0');
  updatePhaseGlyph(current + 1);
  updateDots();
  const card = track.children[current];
  if(card) card.scrollTop = 0;
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') goTo(current - 1);
  if(e.key === 'ArrowRight') goTo(current + 1);
});

// swipe support
let touchStartX = null;
let touchStartY = null;
const viewport = document.querySelector('.card-viewport');

viewport.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

viewport.addEventListener('touchend', (e) => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) goTo(current + 1);
    else goTo(current - 1);
  }
  touchStartX = null;
  touchStartY = null;
}, {passive:true});

dotsEl.addEventListener('click', (e) => {
  const dot = e.target.closest('.dot');
  if(!dot) return;
  goTo(parseInt(dot.dataset.i, 10));
});

render();

</script>
</body>
</html>
