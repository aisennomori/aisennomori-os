<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>症状と精神の関係ビューア</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 20px; }
    h1 { font-size: 1.4rem; }
    label { font-weight: 600; }
    select { padding: 4px 8px; margin-left: 8px; }
    input[type="text"] { padding: 4px 8px; margin-left: 8px; width: 200px; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; }
    th { background: #f5f5f5; }
    .note { font-size: 0.85rem; color: #555; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>症状と精神の関係</h1>

  <label for="diseaseSelect">病気や問題を選択：</label>
  <select id="diseaseSelect">
    <option value="">（すべて表示）</option>
  </select>

  <label for="diseaseSearch" style="margin-left:16px;">検索（部分一致）：</label>
  <input type="text" id="diseaseSearch" placeholder="例：胃、頭、痛み など" />

  <div class="note">※病気や問題を選ぶと、その項目だけが表示されます。</div>

  <table id="resultTable">
    <thead>
      <tr>
        <th>病気や問題</th>
        <th>思考・信念・感情</th>
        <th>新しいものの見方・価値観</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <script>
    const data = [
      { disease: "脳腫瘍", mind: "間違った考えがインプットされている。頑固。今までの思考パターンを変えたくない。", newView: "心のコンピューターのプログラムを作り直せば、簡単に人生も変わり、私の心も一新する。" },
      { disease: "目の障害", mind: "見えるものが気に入らない。", newView: "見たいものが見えるような生き方をする。" },
      { disease: "耳痛", mind: "怒り。聞きたくない。収拾のつかない混乱。両親の言い争い。", newView: "まわりとうまくいっている。嬉しいこと、いいことを熱心に聴く。私は愛そのものなのだから。" },
      { disease: "鼻血", mind: "認識を必要とする。まわりに認められない。愛情を切望。", newView: "自分を慈しみ受け入れる。自分の真の価値を認める。私は素晴らしい。" },
      { disease: "首の障害", mind: "問題の側面を見ようとしない。頑固。柔軟性に欠ける。", newView: "問題をあらゆる面から見るのは簡単。物事のやり方や見方は限りなくある。私は守られている。" },
      { disease: "肩", mind: "重荷ではなく、喜びをもたらすもののはず。", newView: "喜びを感じても大丈夫。" },
      { disease: "噛み爪", mind: "欲求不満。自己を蝕む。片親のいじめ。", newView: "安心して大きくなれる。今は喜びと安心に満たされて自分の人生を生きている。" },
      { disease: "皮膚の障害", mind: "不安、恐れ。脅かされている。", newView: "喜びと安らぎに満ちた考えで自分を守る。過去のことは気にしない。この瞬間から私は自由。" },
      { disease: "肺の障害", mind: "憂鬱。悲しみ。生の取り入れが怖い。生きていてはいけないのではないか。", newView: "心ゆくまで生を取り入れられる。精いっぱい、生きる。" },
      { disease: "呼吸器疾患", mind: "人生のすべてが恐れで埋め尽くされている。", newView: "私は守られている。この人生を愛している。" },
      { disease: "心臓発作・心筋梗塞", mind: "お金や地位などを得るために心から喜びを絞り出している。", newView: "喜びを心の中心に取り戻す。私はみんなに愛をふりまく。" },
      { disease: "血液の問題", mind: "喜びに欠ける。気の巡りが悪い。", newView: "体内で喜びにあふれた新しい考えが駆け巡っている。" },
      { disease: "神経質", mind: "恐れ。もがき、押し寄せてくるような感覚。人生の成り行きに身を任せられない。", newView: "私は果てしない未来に向かって終わりのない旅をしている。時間はたっぷりある。私は心から語り合う。すべてがうまくいく。" },
      { disease: "背骨（上部）", mind: "情緒不安定。愛されていない気がする。愛情を押し殺している。", newView: "自分を慈しみ受け入れる。人生に支えられ大事にされているのだから。" },
      { disease: "背骨（中部）", mind: "罪の意識。背骨に詰まっている「呵責」に困っている。放っておいてくれと思っている。", newView: "過去にさようなら。私の心の中の愛とともに前進できる。" },
      { disease: "背骨（下部）", mind: "お金に対する恐れ。お金に困っている。", newView: "人生の成り行きに身を任せる。必要なものは必ずやってくる。大丈夫。" },
      { disease: "関節炎", mind: "罰したいという願い。悲観。犠牲者になった気持ち。", newView: "愛情と理解を持って物事と見る。私の経験には愛の光が注がれている。" },
      { disease: "胃の障害", mind: "ひどく恐れる。新しいことを恐れ、消化できない。", newView: "人生とうまくやっている。どんなときでも新しいことを吸収する。すべてがうまくいく。" },
      { disease: "腸の障害", mind: "不必要なものを手放せないでいる。", newView: "古いものを気軽に手放して、新しいものを喜んで受け入れる。" },
      { disease: "肝臓障害", mind: "不平不満が絶えない。思い違いを正当化するために批判をよしとする。後ろめたい。", newView: "正直に生きる。愛を求めればどこにでもある。" },
      { disease: "足の障害", mind: "未来に対して恐れを抱くあまり、一歩踏み出せないでいる。", newView: "私は喜んで気楽に生きていく。" },
      { disease: "慢性疲労症候群", mind: "能力を超えた要求。役立たずになることへの恐れ。心の支えがない。ストレスでぼろぼろになっている。", newView: "自分は価値がある存在だ。人生はなんでもうまくいく楽しいもの。" },
      { disease: "扁桃炎", mind: "恐れ。感情の抑圧。創造性が伸びない。", newView: "思い通りの幸せに満ち足りている。神の考えが私のなかにあらわれている。私の心は穏やかである。" },
      { disease: "咳", mind: "注目されたい。「私を見て、私の声を聞いて!」という叫び。", newView: "私は気にかけられ、真価を認められている。私は愛されている。" },
      { disease: "過呼吸", mind: "恐れ。前向きに取り組もうとしない。成り行きに任せられない。", newView: "私はどこにいても守られている。自分を慈しみ人生のいくままに委ねる。" },
      { disease: "高血圧", mind: "情緒不安定から抜け出せない。", newView: "喜んで過去を手放す。穏やかな気持ちだ。" },
      { disease: "低血圧", mind: "幼児期に愛に飢えていた。挫折。やっても何の役にも立たない、うまくいかない。", newView: "かつてないほど楽しく暮らす。私の人生は喜びであふれている。" },
      { disease: "過食症", mind: "絶望的な恐怖。自分への憎しみを詰めこみ、無理やり消化しようとする。", newView: "私は愛によって育まれて、いつでも生命そのものからサポートされている。生きていくことに不安はない。" },
      { disease: "リンパ障害", mind: "人生の本質に立ち返るよう警告を受けている。愛と喜びの不足。", newView: "生きているということに愛と喜びを感じる。人生に身を委ねる。心が穏やかだ。" },
      { disease: "リュウマチ", mind: "犠牲になった気分。愛情に飢えている。いつも苦しんでいる。恨み。", newView: "経験は私が作り出すもの。自分や他人を受け入れれば、さらにいい経験をする。" },
      { disease: "ヘルニア", mind: "断絶した関係。緊張。負担。創造の表現のしかたが違っている。", newView: "私の心は穏やかである。自分を悲しみ受け入れよう。自信を持つ。" },
      { disease: "胃炎", mind: "不安定な状態が長く続く。悲運だと思う。", newView: "自分を慈しみ受け入れる。私は守られている。" },
      { disease: "潰瘍", mind: "恐れ。自分が無能だとかたく思い込んでいる。何かがあなたを蝕んでいる。", newView: "自分を慈しみ受け入れる。私は落ち着いている。すべてがうまくいく。" },
      { disease: "腫瘍", mind: "昔の傷やショックを育てている。自責の念。", newView: "気持ちをこめて過去を手放し、明日に向かって生きていく。全てがうまくいく。" },
      { disease: "ガン", mind: "深く傷つけられる。恨みが募る。自分を蝕むような秘密や深い悲しみ。嫌悪感。「それがどうだというのか」という考え。", newView: "心から過去を許して手放す。私の人生は喜びにあふれている。自分を慈しみ受け入れる。" },

      // ②の内容
      { disease: "頭", mind: "世のなかへ主張するものを意味する。", newView: "自分自身に自信を持って、自己表現する。" },
      { disease: "乱視", mind: "悩んでいる。自己を見るのが本当に怖い。", newView: "いまは自分の美しさや素晴らしさを見たい。" },
      { disease: "子供の目の場合", mind: "家庭内で起こっていることを見たくない。", newView: "調和、喜び、美、安全がこの子供を取り巻いている。" },
      { disease: "近視", mind: "未来に対する恐れ。先のことが信用できない。", newView: "神のお導き通りに進む。私はいつも守られている。" },
      { disease: "遠視", mind: "現在に対する恐れ。", newView: "今ここにいても安全なことがわかる。" },
      { disease: "鼻水", mind: "助けを求めている。心の中で泣いている。", newView: "自分を愛し、優しく慰める。" },
      { disease: "鼻づまり", mind: "自分の価値に気づいていない。", newView: "自分を愛し、その価値を認める。" },
      { disease: "喉の痛み", mind: "とげのある言葉を抱え込んでいる。自分を表現できないと感じている。", newView: "私は自分を縛らない。自由に自分自身でいられる。" },
      { disease: "腕", mind: "人生の経験を喜んで受け入れられるかを意味する。", newView: "自分の経験を安心して喜びでもって受け入れる。" },
      { disease: "ひじ", mind: "方向転換や新しい経験を受け入れることを意味する。", newView: "新しい経験、方向、変化にすぐに順応できる。" },
      { disease: "手首", mind: "動きとゆとりを意味する。", newView: "知恵と愛情とゆとりを持って経験を処理する。" },
      { disease: "乳房の障害・しこり", mind: "異常な母性。過保護。横柄な態度。育てようとしない。", newView: "自分や他人のありのままを受け入れる。大人になることはぜんぜん怖くない。" },
      { disease: "呼吸の問題", mind: "精一杯生きるのが怖い、あるいはそうしたくない。他の存在に気兼ねする。過剰防衛。", newView: "人生を好きなだけ満喫してもいいのだ。人生を大事にしてもいいのだ。今から人生を充分に楽しむ。" },
      { disease: "動脈硬化症", mind: "抵抗や緊張。心が狭い。いいことに目を向けない。", newView: "私は心をいっぱいに開いて喜びをもって生きる。暖かいまなざしを向けていく。" },
      { disease: "貧血", mind: "あいまいな態度。喜びを知らず人生を恐れている。物足りない感じ。", newView: "私にだって喜びに満ちた人生を味わえる。人生っていいな。" },
      { disease: "神経衰弱", mind: "自己中心的。コミュニケーションのルートを妨害する。", newView: "心を開いて思いやりを持って語りあう。私は守られている。私は健康だ。" },
      { disease: "神経痛", mind: "罪を罰する。コミュニケーションに苦労する。", newView: "自分自身を許す。自分を慈しみ受け入れる。心から語りあう。" },
      { disease: "骨髄炎", mind: "人生の根本に怒りや欲求不満を感じる。支えてくれるものがない。", newView: "私は守られながら穏やかに生きている。人生の成り行きに身を任せる。" },
      { disease: "膝の障害", mind: "頑ななエゴとプライド。曲げられない。恐れ。融通がきかない。譲らない。", newView: "許し。理解。同情。もっと柔軟になればすべてがうまくいく。" },
      { disease: "アレルギー", mind: "誰かを嫌っているのか。自分の持つ変える力を否定している。", newView: "世の中は安全。微笑みかけてくれる。安心して平穏無事に暮らせる。" },
      { disease: "偏頭痛", mind: "コントロールされるのを好まない。人生の成り行きを拒む。性的恐怖感。", newView: "人生の成り行きに身を任せれば、必要なものを手に入れられる。それが我が人生。" },
      { disease: "脳卒中・脳梗塞", mind: "あきらめ。反発。自分が変わるなら死んだほうがまし。生を拒む。", newView: "人生は移り変わるもの。私は抵抗なく新しいことを受け入れる。私は過去、現在、未来の人生を受け入れる。" },
      { disease: "耳鳴り", mind: "聞きたくない。心の声を聞いていない。頑固。", newView: "高尚なる自己を信じる。心の声には熱心に聞き入る。愛の働きと無縁なものはなくす。" },
      { disease: "気管支炎", mind: "争いごとの絶えない家庭環境。ときには静まりかえっている。", newView: "私の心とまわりを平和と調和で満たす。すべてがうまくいく。" },
      { disease: "拒食症", mind: "自己の生を否定。極度の恐れ。自己嫌悪。拒絶。", newView: "自分に自信を持っても大丈夫だ。ありのままの私がすばらしい。自分を受け入れて喜びとともに生きていく。" },
      { disease: "帯状疱疹", mind: "気をもみながら待つ。恐れと緊張。神経質。", newView: "人生の成り行きに身を任せているので、心身ともにリラックスしている。すべてがうまくいく。" },
      { disease: "便秘", mind: "これまでの考えを捨てたくない。過去にこだわる。苦しい思いをすることもあるという考え。", newView: "過去を手放せば、体内に新しく新鮮で生き生きした生命が流れる。生命の流れに身を委ねる。" },
      { disease: "月経前症候群", mind: "混乱状態を収拾できない。まわりを気にして疲弊していく。女性の営みを拒む。", newView: "私が心と生活の管理をする。私の力のある最高の女性なのだから。身体の機能はどこも申し分ない。自分が大好きだ。" },
      { disease: "甲状腺障害", mind: "屈辱。自分のしたいことをしたことがない。いつになったらできるのだろう。", newView: "今までの思い込みを乗り越えて、自由に想像力たくましく表現していく。" },
      { disease: "更年期障害", mind: "必要とされていないのではないかと恐る。老いが怖い。自己を拒絶。自分は無能で役立たず。", newView: "生きていく上でのサイクルが変わっても心は落ち着いている。自分の身体に心から感謝する。" },
      { disease: "精神障害", mind: "家族から逃げる。逃避。人生から乱暴に引き離される。", newView: "この心は本物を知っており、神のあらわされるものを創造している。" },
      { disease: "多動性障害", mind: "恐れ。抑圧され、気が狂いそうになっている。", newView: "私は安全。すべての圧力は溶けて消える。私は価値ある人間だ。" },
      { disease: "うつ病", mind: "絶望。持つべき権利を持てない怒り。", newView: "まわりから科せられる恐れやくびきを超える。私は自らの手で人生を創造する。" },
      { disease: "自殺衝動", mind: "物事を黒か白かでしか見られない。自分のやり方を変えたくない。", newView: "私の生命のなかにすべての可能性がある。いつでも別の方法がある。私は守られている。" },
      { disease: "不眠症", mind: "恐れ。人生の成り行きに身を任せられない。罪悪感。", newView: "心をこめて今日という日を手放し、安らかに眠りにつく。明日はまた明日のこと。" },
      { disease: "吃音", mind: "不安。自己表現に欠ける。泣き叫ぶと怒られた。", newView: "私は自由に話せる。自分を表現してもいい。私は愛情のこもった言葉しか話せない。" },
      { disease: "無感覚・無覚異常", mind: "愛情や思いやりを抑えている。", newView: "自分の感覚や愛を感じられる。みんなの愛に応える。" }
    ];

    const select = document.getElementById("diseaseSelect");
    const searchInput = document.getElementById("diseaseSearch");
    const tbody = document.getElementById("resultBody");

    // セレクトボックスに病気名を追加
    const uniqueDiseases = [...new Set(data.map(item => item.disease))].sort();
    uniqueDiseases.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      select.appendChild(opt);
    });

    function renderTable() {
      tbody.innerHTML = "";
      const selected = select.value;
      const keyword = searchInput.value.trim();

      const rows = data.filter(item => {
        const matchesSelect = !selected || item.disease === selected;
        const matchesSearch = !keyword || item.disease.includes(keyword);
        return matchesSelect && matchesSearch;
      });

      rows.forEach(item => {
        const tr = document.createElement("tr");

        const tdDisease = document.createElement("td");
        tdDisease.textContent = item.disease;

        const tdMind = document.createElement("td");
        tdMind.textContent = item.mind;

        const tdNew = document.createElement("td");
        tdNew.textContent = item.newView;

        tr.appendChild(tdDisease);
        tr.appendChild(tdMind);
        tr.appendChild(tdNew);
        tbody.appendChild(tr);
      });
    }

    select.addEventListener("change", () => {
      renderTable();
    });
    searchInput.addEventListener("input", () => {
      renderTable();
    });

    // 初期表示（全件）
    renderTable();
  </script>
</body>
</html>
