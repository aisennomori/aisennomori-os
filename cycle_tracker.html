<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ムーンサイクル手帖 | 愛泉の杜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
  :root{
    --bg:#FBF6EC; --card:#FFF; --ink:#3A322A; --soft:#9A8F80;
    --line:#EAE1D2; --wax:#4F9D94; --full:#E2A23C; --wan:#8FAE7E;
    --fd:'Shippori Mincho','Yu Mincho',serif;
    --fb:'Zen Kaku Gothic New','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--fb);}

  .hdr{background:linear-gradient(180deg,#3E3A33,#4A4339);color:#F7F1E4;
    padding:18px 16px 20px;border-radius:0 0 20px 20px;}
  .hdr h1{font-family:var(--fd);font-size:1.2rem;font-weight:700;letter-spacing:.04em;margin-bottom:2px;}
  .hdr .sub{font-size:.7rem;color:#CFC4AE;letter-spacing:.08em;}

  .today-bar{margin-top:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;}
  .today-icon{font-size:1.8rem;line-height:1;}
  .today-lbl{font-size:.64rem;color:#CFC4AE;letter-spacing:.07em;}
  .today-nm{font-family:var(--fd);font-weight:700;font-size:.9rem;color:#FBF6EC;}
  .today-nm .kana{font-weight:400;font-size:.72rem;color:#D8CDB8;margin-left:5px;}

  .nav{display:flex;align-items:center;gap:8px;margin:14px 12px 10px;}
  .nbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);font-size:1.1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;}
  .nbtn:active{background:var(--line);}
  .ntitle{flex:1;text-align:center;font-family:var(--fd);font-weight:700;
    font-size:1.1rem;letter-spacing:.04em;}

  .cal-wrap{margin:0 12px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;}

  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);
    border-bottom:2px solid var(--line);}
  .dc{text-align:center;font-size:.68rem;font-weight:700;padding:8px 0;color:var(--soft);}
  .dc.s{color:#C25450;} .dc.sa{color:#4A6FA5;}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);}

  .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:4px 2px 5px;min-height:78px;
    display:flex;flex-direction:column;align-items:center;gap:1px;
    cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
    position:relative;}
  .cell:nth-child(7n){border-right:none;}
  .cell.empty{background:rgba(0,0,0,.018); cursor:default;}
  .cell.today{background:#FFF7E2;}
  .cell:not(.empty):active{background:#F5EFDD;}

  .cell[data-g="wax"]{border-top:2.5px solid var(--wax);}
  .cell[data-g="full"]{border-top:2.5px solid var(--full);}
  .cell[data-g="wan"]{border-top:2.5px solid var(--wan);}

  .dnum{font-family:var(--fd);font-weight:700;font-size:.9rem;line-height:1.3;
    width:100%;text-align:center;}
  .dnum.s{color:#C25450;} .dnum.sa{color:#4A6FA5;}
  .dicon{width:32px;height:32px;object-fit:contain;}
  .dnight{font-size:.58rem;color:var(--soft);font-weight:700;}
  .dname{font-size:.54rem;color:var(--soft);text-align:center;
    white-space:nowrap;overflow:hidden;max-width:100%;}
  .dmark{font-size:.95rem;line-height:1;min-height:1.05rem;}

  .leg{display:flex;gap:12px;margin:10px 14px 6px;font-size:.67rem;
    color:var(--soft);flex-wrap:wrap;}
  .leg span{display:inline-flex;align-items:center;gap:5px;}
  .leg i{display:inline-block;width:10px;height:10px;border-radius:2px;}
  .lw{background:var(--wax);} .lf{background:var(--full);} .ln{background:var(--wan);}

  .markhelp{
    margin:8px 14px 0;
    font-size:.7rem;
    color:var(--soft);
    text-align:center;
    line-height:2;
  }
  .mh-step{
    display:inline-block;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:2px 9px;
    font-size:.75rem;
    color:var(--ink);
    margin:0 1px;
  }
  .mh-arrow{
    color:var(--soft);
    margin:0 3px;
    font-size:.7rem;
  }

  .notice{
    margin:14px 12px 0;
    background:rgba(0,0,0,.03);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 16px;
    font-size:.68rem;
    color:var(--soft);
    line-height:1.8;
    text-align:center;
  }
  .notice strong{color:var(--ink);}

  .pbtn{display:block;width:calc(100% - 24px);margin:14px 12px 0;
    font-family:var(--fd);font-weight:700;font-size:.9rem;letter-spacing:.05em;
    color:#FBF6EC;background:var(--ink);border:none;border-radius:12px;
    padding:13px;cursor:pointer;text-align:center;}
  .pbtn:active{opacity:.85;}
  .phint{text-align:center;font-size:.67rem;color:var(--soft);margin:6px 0 24px;}
  @media print{
    .hdr{background:none;color:var(--ink);border-radius:0;}
    .today-bar,.nav,.leg,.pbtn,.phint,.notice,.markhelp{display:none;}
    .cal-wrap{border:none;border-radius:0;margin:0;}
  }
</style>
</head>
<body>
<header class="hdr">
  <h1>🌙 ムーンサイクル手帖</h1>
  <p class="sub">愛泉の杜 ─ Spirit Tools</p>
  <div class="today-bar">
    <div class="today-icon" id="tIcon">🌕</div>
    <div>
      <div class="today-lbl" id="tLbl">今日の月</div>
      <div class="today-nm" id="tNm">─</div>
    </div>
  </div>
</header>

<div class="nav">
  <button class="nbtn" id="prevBtn">←</button>
  <div class="ntitle" id="navTitle">─</div>
  <button class="nbtn" id="nextBtn">→</button>
</div>

<div class="cal-wrap">
  <div class="dow-row">
    <div class="dc s">日</div>
    <div class="dc">月</div><div class="dc">火</div>
    <div class="dc">水</div><div class="dc">木</div>
    <div class="dc">金</div>
    <div class="dc sa">土</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="leg">
  <span><i class="lw"></i>Ho'onui 満ちる（1〜10）</span>
  <span><i class="lf"></i>Poepoe 満月期（11〜20）</span>
  <span><i class="ln"></i>Ho'emi 欠ける（21〜30）</span>
</div>

<div class="markhelp">
  日付をタップするとマークが切り替わります：<br>
  <span class="mh-step">なし</span><span class="mh-arrow">→</span>
  <span class="mh-step">♦️</span><span class="mh-arrow">→</span>
  <span class="mh-step">❤️</span><span class="mh-arrow">→</span>
  <span class="mh-step">なし</span>
</div>

<div class="notice">
  <strong>🔒 プライバシーについて</strong><br>
  タップしたマークはすべて<strong>あなたの端末の中だけに保存</strong>されます。
  外部サーバーには送信されませんのでご安心ください。
</div>

<button class="pbtn" id="pBtn">📄 PDFとして印刷</button>
<p class="phint">印刷ダイアログで「PDFに保存」を選ぶとPDF化できます</p>

    for(let k=kFor(y,1)-4; k<=kFor(y,12)+4; k++){
      const jst=new Date((newMoonJDE(k)-2440587.5)*D+9*3600*1000);
      const ms=Date.UTC(jst.getUTCFullYear(),jst.getUTCMonth(),jst.getUTCDate());
      if(!seen.has(ms)){ seen.add(ms); list.push(ms); }
    }
    return nmCache[y]=list.sort((a,b)=>a-b);
  }
  function nmNear(y){
    const merged=getNM(y-1).concat(getNM(y),getNM(y+1));
    const seen=new Set();
    return merged.filter(ms=>seen.has(ms)?false:seen.add(ms)).sort((a,b)=>a-b);
  }

  function findCycle(y,m){
    const monthStart=Date.UTC(y,m-1,1);
    const monthEnd=Date.UTC(m<12?y:y+1, m<12?m:0, 1);
    const list=nmNear(y);
    for(let i=1; i<list.length; i++){
      const hiloKari=list[i-1]+D;
      if(hiloKari<monthStart||hiloKari>=monthEnd) continue;

      const hd=new Date(hiloKari);
      const key=hd.getUTCFullYear()+'-'+String(hd.getUTCMonth()+1).padStart(2,'0');
      const ov=CONFIRMED[key];
      if(ov) return {
        hiloMs: new Date(ov.hilo+'T00:00:00Z').getTime(),
        mukuMs: new Date(ov.muku+'T00:00:00Z').getTime(),
        hasMauli: ov.hasMauli,
        isConfirmed: true,
      };

      const hasMauli=Math.round((list[i]-list[i-1])/D)===30;
      return { hiloMs:hiloKari, mukuMs:list[i], hasMauli, isConfirmed:false };
    }
    return null;
  }

  function adjCycle(cycle,dir){
    const d=new Date(cycle.hiloMs);
    let y=d.getUTCFullYear(), m=d.getUTCMonth()+1+dir;
    if(m>12){m=1;y++;}else if(m<1){m=12;y--;}
    return findCycle(y,m);
  }

  function getMoonNight(year,month,day){
    const target=Date.UTC(year,month-1,day);
    for(let dm=-1; dm<=1; dm++){
      let m=month+dm, y=year;
      if(m<1){m=12;y--;} if(m>12){m=1;y++;}
      const cy=findCycle(y,m);
      if(!cy) continue;
      const{hiloMs,mukuMs,hasMauli}=cy;
      if(target===mukuMs) return 30;
      if(target===mukuMs-D && hasMauli) return 29;
      const offset=Math.round((target-hiloMs)/D);
      if(offset>=0 && offset<=27) return offset+1;
    }
    return null;
  }

// ── マーク管理（オンオフ：♦️ ⇄ ❤️）────────────────────────────
// 0=なし 1=♦️ 2=❤️
function msToKey(ms){
  const d=new Date(ms);
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
}
function getMark(ms){ return parseInt(localStorage.getItem('ct:'+msToKey(ms))||'0'); }
function setMark(ms,v){ localStorage.setItem('ct:'+msToKey(ms), String(v)); }
function cycleMark(ms){
  const cur=getMark(ms);
  const next=(cur+1)%3;
  setMark(ms,next);
  return next;
}
const MARK_ICONS=['','♦️','❤️'];

// ── 状態 ─────────────────────────────────────────────────────
let cY,cM;

// ── 今日ウィジェット ─────────────────────────────────────────
(function(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate();
  const n=getMoonNight(y,m,d);
  const md=n?MD[n]:null;
  const dow=['日','月','火','水','木','金','土'][now.getDay()];
  document.getElementById('tLbl').textContent=`${y}年${m}月${d}日（${dow}）`;
  if(md){
    document.getElementById('tIcon').innerHTML=
      `<img src="${MOON_IMGS[n]}" alt="${md.name}" style="width:32px;height:32px;object-fit:contain;">`;
    document.getElementById('tNm').innerHTML=
      `第${n}夜 ${md.name}<span class="kana">${md.kana}</span>`;
  } else {
    document.getElementById('tNm').textContent='新月期';
  }
})();

// ── カレンダー描画 ───────────────────────────────────────────
function render(year,month){
  cY=year; cM=month;
  document.getElementById('navTitle').textContent=`${year}年 ${month}月`;

  const now=new Date();
  const todayMs=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  const firstDow=new Date(year,month-1,1).getDay();
  const dim=new Date(year,month,0).getDate();
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  for(let i=0;i<firstDow;i++){
    const c=document.createElement('div');
    c.className='cell empty';
    grid.appendChild(c);
  }

  for(let d=1;d<=dim;d++){
    const ms=Date.UTC(year,month-1,d);
    const dow=new Date(year,month-1,d).getDay();
    const isToday=(ms===todayMs);
    const n=getMoonNight(year,month,d);
    const md=n?MD[n]:null;

    const c=document.createElement('div');
    c.className='cell'+(isToday?' today':'');
    if(md) c.dataset.g=md.g;

    const dn=document.createElement('div');
    dn.className='dnum'+(dow===0?' s':dow===6?' sa':'');
    dn.textContent=d;
    c.appendChild(dn);

    if(md){
      const ic=document.createElement('img');
      ic.className='dicon';
      ic.src=MOON_IMGS[n];
      ic.alt=md.name;
      c.appendChild(ic);

      const ni=document.createElement('div');
      ni.className='dnight';
      ni.textContent=`第${n}夜`;
      c.appendChild(ni);

      const nm=document.createElement('div');
      nm.className='dname';
      nm.textContent=md.name;
      c.appendChild(nm);

      // マーク（タップでオンオフ：なし→♦️→❤️→なし）
      const mk=document.createElement('div');
      mk.className='dmark';
      const curMark=getMark(ms);
      mk.textContent=MARK_ICONS[curMark];
      c.appendChild(mk);

      c.addEventListener('click', ()=>{
        const newMark=cycleMark(ms);
        mk.textContent=MARK_ICONS[newMark];
      });
    }

    grid.appendChild(c);
  }

  const total=firstDow+dim;
  const rem=total%7;
  if(rem>0){
    for(let i=0;i<7-rem;i++){
      const c=document.createElement('div');
      c.className='cell empty';
      grid.appendChild(c);
    }
  }
}

// ── イベント ─────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click',()=>{
  let m=cM-1,y=cY;
  if(m<1){m=12;y--;}
  render(y,m);
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  let m=cM+1,y=cY;
  if(m>12){m=1;y++;}
  render(y,m);
});
document.getElementById('pBtn').addEventListener('click',()=>window.print());

// 初期表示
const _now=new Date();
render(_now.getFullYear(),_now.getMonth()+1);
</script>
