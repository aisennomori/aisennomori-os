<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハワイアン・ムーン手帖 | 愛泉の杜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root{
    --bg:#FBF6EC;
    --card:#FFFFFF;
    --ink:#3A322A;
    --ink-soft:#9A8F80;
    --line:#EAE1D2;
    --font-display:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
    --font-body:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
  }

  .page{
    max-width:540px;
    margin:0 auto;
    padding:0 0 40px;
    min-height:100vh;
  }

  header.app-header{
    background:linear-gradient(180deg,#3E3A33 0%,#4A4339 100%);
    color:#F7F1E4;
    padding:22px 20px 26px;
    border-radius:0 0 22px 22px;
  }
  header.app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.3rem;
    letter-spacing:.04em;
    margin:0 0 2px;
  }
  header.app-header .subtitle{
    font-size:.75rem;
    color:#CFC4AE;
    letter-spacing:.08em;
    margin:0;
  }

  .controls{
    margin:18px 16px 4px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .controls .field{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .controls label{
    font-size:.7rem;
    color:var(--ink-soft);
    letter-spacing:.06em;
  }
  .controls select{
    font-family:var(--font-body);
    font-size:.95rem;
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;
    padding:7px 10px;
    background:#FCFAF5;
  }
  .controls button{
    margin-left:auto;
    font-family:var(--font-display);
    font-weight:700;
    font-size:.9rem;
    color:#FBF6EC;
    background:var(--ink);
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    letter-spacing:.05em;
  }
  .controls button:active{ opacity:.85; }

  .cycle-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:18px 16px 10px;
    gap:8px;
  }
  .nav-btn{
    flex-shrink:0;
    width:40px; height:40px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--card);
    font-size:1.1rem;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-btn:active{ background:#F0EAD9; }
  .nav-btn:disabled{ opacity:.35; cursor:default; }
  .cycle-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:.92rem;
    color:var(--ink);
    text-align:center;
    flex:1;
    line-height:1.4;
  }

  /* ===== PDF Sheet Preview ===== */
  .sheet-wrap{
    margin:0 16px 18px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,0.06);
  }
  .sheet{
    position:relative;
    width:100%;
    /* aspect ratio matches the template: 475.557 x 481.89 pt */
    aspect-ratio: 475.557 / 481.89;
  }
  .sheet img.bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }
  .sheet .period-band{
    position:absolute;
    /* percentage based on page width/height 475.557 x 481.89 */
    left: 4.8%;
    top: 0.8%;
    width: 90.4%;
    font-family:var(--font-display);
    font-weight:700;
    font-size: 2.05vw;
    color:#3A322A;
    text-align:left;
    letter-spacing:.02em;
    background:rgba(255,255,255,0.0);
  }
  .sheet .cell{
    position:absolute;
    transform:translate(-50%, 0);
    text-align:center;
    line-height:1.15;
    white-space:nowrap;
  }
  .sheet .cell .md{
    font-family:var(--font-body);
    font-weight:700;
    font-size: 1.42vw;
    color:#3A322A;
  }
  .sheet .cell .dow{
    font-size: 1.42vw;
    color:#3A322A;
    margin-left:0.15em;
  }
  .sheet .cell .mk{
    font-size: 1.42vw;
    margin-left:0.2em;
  }
  .sheet .cell.today .md,
  .sheet .cell.today .dow{
    color:#C0392B;
  }

  .legend-note{
    margin:0 16px 16px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    font-size:.72rem;
    color:var(--ink-soft);
    line-height:1.8;
  }
  .legend-note .legend-row{
    display:inline-flex;
    align-items:center;
    gap:4px;
    margin-right:14px;
  }

  .print-section{
    margin:22px 16px 0;
  }
  .print-section button{
    width:100%;
    font-family:var(--font-display);
    font-weight:700;
    font-size:1rem;
    letter-spacing:.06em;
    color:#FBF6EC;
    background:var(--ink);
    border:none;
    border-radius:12px;
    padding:14px;
    cursor:pointer;
  }
  .print-section button:active{ opacity:.85; }
  .print-hint{
    text-align:center;
    font-size:.7rem;
    color:var(--ink-soft);
    margin-top:8px;
  }

  @media print{
    body{ background:#fff; }
    header.app-header{ display:none; }
    .controls{ display:none; }
    .cycle-nav .nav-btn{ display:none; }
    .cycle-nav .cycle-title{ display:none; }
    .cycle-nav{ margin:0; }
    .legend-note{ border:none; }
    .print-section{ display:none; }
    .page{ max-width:100%; padding:0; }
    .sheet-wrap{ box-shadow:none; border:none; margin:0; }
    @page{ size:auto; margin:8mm; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="app-header">
    <h1>ハワイアン・ムーン手帖</h1>
    <p class="subtitle">愛泉の杜 ｰ ムーン手帖(PDF出力版)</p>
  </header>

  <section class="controls">
    <div class="field">
      <label for="yearInput">西暦年</label>
      <select id="yearInput" required></select>
    </div>
    <div class="field">
      <label for="monthInput">月</label>
      <select id="monthInput" required>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
    <button id="generateBtn" type="button">表示する</button>
  </section>

  <div class="cycle-nav">
    <button class="nav-btn" id="prevBtn" type="button" aria-label="前のサイクル">⬅️</button>
    <div class="cycle-title" id="calTitle"></div>
    <button class="nav-btn" id="nextBtn" type="button" aria-label="次のサイクル">➡️</button>
  </div>

  <div class="sheet-wrap">
    <div class="sheet" id="sheet">
      <img class="bg" id="sheetBg" src="" alt="ムーン手帖テンプレート">
      <div class="period-band" id="periodBand"></div>
      <!-- cells injected by JS -->
    </div>
  </div>

  <div class="legend-note">
    <span class="legend-row"><span>🔵</span>新しい事を始める</span>
    <span class="legend-row"><span>❤️</span>休息期</span>
    <span class="legend-row"><span>🟢</span>食物パワー</span>
    <span class="legend-row"><span>🩵</span>浄化期</span>
    <br>※ 各夜の日付・曜日マスは、その日が今日であれば赤色で表示されます。
  </div>

  <section class="print-section">
    <button id="printBtn" type="button">PDFとして印刷</button>
    <p class="print-hint">印刷ダイアログで「PDFに保存」を選ぶとPDF化できます</p>
  </section>

</div>

<script>
  const dowNames = ['日','月','火','水','木','金','土'];

  const moonData = [
    null,
    {n:1,  name:"Hilo"},
    {n:2,  name:"Hoaka"},
    {n:3,  name:"Kū-kahi"},
    {n:4,  name:"Kū-lua"},
    {n:5,  name:"Kū-kolu"},
    {n:6,  name:"Kū-pau"},
    {n:7,  name:"ʻOle-kū-kahi"},
    {n:8,  name:"ʻOle-kū-lua"},
    {n:9,  name:"ʻOle-kū-kolu"},
    {n:10, name:"ʻOle-pau"},
    {n:11, name:"Huna"},
    {n:12, name:"Mōhalu"},
    {n:13, name:"Hua"},
    {n:14, name:"Akua"},
    {n:15, name:"Hoku"},
    {n:16, name:"Māhealani"},
    {n:17, name:"Kulu"},
    {n:18, name:"Lāʻau-kū-kahi"},
    {n:19, name:"Lāʻau-kū-lua"},
    {n:20, name:"Lāʻau-kū-kolu"},
    {n:21, name:"ʻOle-kū-kahi"},
    {n:22, name:"ʻOle-kū-lua"},
    {n:23, name:"ʻOle-pau"},
    {n:24, name:"Kāloa-kū-kahi"},
    {n:25, name:"Kāloa-kū-lua"},
    {n:26, name:"Kāloa-pau"},
    {n:27, name:"Kāne"},
    {n:28, name:"Lono"},
    {n:29, name:"Mauli"},
    {n:30, name:"Muku"},
  ];

  // ============================================================
  // 各セルの座標（PDFテンプレート上のポイント座標 → パーセンテージに変換）
  // PAGE_W x PAGE_H = テンプレートPDFの実寸 (pt)
  // ============================================================
  const PAGE_W = 475.557;
  const PAGE_H = 481.89;

  // 番号(1〜30)の列中心X座標 と カナ行の下端Y座標（PDFポイント, 上原点=top基準）
  const CELL_GRID = {
    1:{cx:45.05, kanaBottom:96.5},   2:{cx:87.7,  kanaBottom:96.5},
    3:{cx:131.45,kanaBottom:96.5},   4:{cx:172.75,kanaBottom:96.5},
    5:{cx:215.25,kanaBottom:96.5},   6:{cx:259.55,kanaBottom:96.5},
    7:{cx:302.15,kanaBottom:96.5},   8:{cx:344.7, kanaBottom:96.5},
    9:{cx:387.25,kanaBottom:96.5},   10:{cx:429.75,kanaBottom:96.5},
    11:{cx:45.05,kanaBottom:239.7},  12:{cx:88.95,kanaBottom:239.7},
    13:{cx:130.2,kanaBottom:239.7},  14:{cx:172.75,kanaBottom:239.7},
    15:{cx:215.25,kanaBottom:239.7}, 16:{cx:259.5,kanaBottom:239.7},
    17:{cx:302.2,kanaBottom:239.7},  18:{cx:344.7,kanaBottom:239.7},
    19:{cx:387.2,kanaBottom:239.7},  20:{cx:429.75,kanaBottom:239.7},
    21:{cx:45.05,kanaBottom:382.9},  22:{cx:87.7, kanaBottom:382.9},
    23:{cx:131.45,kanaBottom:382.9}, 24:{cx:175.55,kanaBottom:382.9},
    25:{cx:215.3,kanaBottom:382.9},  26:{cx:259.5,kanaBottom:382.9},
    27:{cx:302.15,kanaBottom:382.9}, 28:{cx:344.7,kanaBottom:382.9},
    29:{cx:387.2,kanaBottom:382.9},  30:{cx:429.75,kanaBottom:382.9},
  };

  let iconUid = 0;
  let currentYear, currentMonth;

  // ============================================================
  // Astronomical new-moon calculation (Meeus low-precision series)
  // ============================================================
  function newMoonJDE(k) {
    const T = k / 1236.85;
    const T2 = T*T, T3 = T2*T, T4 = T3*T;
    let JDE = 2451550.09766 + 29.530588861*k
      + 0.00015437*T2 - 0.000000150*T3 + 0.00000000073*T4;

    const M  = 2.5534 + 29.10535670*k - 0.0000014*T2 - 0.00000011*T3;
    const Mp = 201.5643 + 385.81693528*k + 0.0107582*T2 + 0.00001238*T3 - 0.000000058*T4;
    const F  = 160.7108 + 390.67050284*k - 0.0016118*T2 - 0.00000227*T3 + 0.000000011*T4;
    const Om = 124.7746 - 1.56375588*k + 0.0020672*T2 + 0.00000215*T3;

    const d2r = Math.PI/180;
    const Ms = (M  % 360) * d2r;
    const Mm = (Mp % 360) * d2r;
    const Fm = (F  % 360) * d2r;
    const Og = (Om % 360) * d2r;
    const E  = 1 - 0.002516*T - 0.0000074*T2;

    let corr = 0;
    corr += -0.40720 * Math.sin(Mm);
    corr +=  0.17241 * E * Math.sin(Ms);
    corr +=  0.01608 * Math.sin(2*Mm);
    corr +=  0.01039 * Math.sin(2*Fm);
    corr +=  0.00739 * E * Math.sin(Mm - Ms);
    corr += -0.00514 * E * Math.sin(Mm + Ms);
    corr +=  0.00208 * E*E * Math.sin(2*Ms);
    corr += -0.00111 * Math.sin(Mm - 2*Fm);
    corr += -0.00057 * Math.sin(Mm + 2*Fm);
    corr +=  0.00056 * E * Math.sin(2*Mm + Ms);
    corr += -0.00042 * Math.sin(3*Mm);
    corr +=  0.00042 * E * Math.sin(Ms + 2*Fm);
    corr +=  0.00038 * E * Math.sin(Ms - 2*Fm);
    corr += -0.00024 * E * Math.sin(2*Mm - Ms);
    corr += -0.00017 * Math.sin(Og);
    corr += -0.00007 * Math.sin(Mm + 2*Ms);
    corr +=  0.00004 * Math.sin(2*Mm - 2*Fm);
    corr +=  0.00004 * Math.sin(3*Ms);
    corr +=  0.00003 * Math.sin(Mm + Ms - 2*Fm);
    corr +=  0.00003 * Math.sin(2*Mm + 2*Fm);
    corr += -0.00003 * Math.sin(Mm + Ms + 2*Fm);
    corr +=  0.00003 * Math.sin(Mm - Ms + 2*Fm);
    corr += -0.00002 * Math.sin(Mm - Ms - 2*Fm);
    corr += -0.00002 * Math.sin(3*Mm + Ms);
    corr +=  0.00002 * Math.sin(4*Mm);

    return JDE + corr;
  }

  function jdeToUTCDate(jde) {
    return new Date((jde - 2440587.5) * 86400000);
  }

  function kForYearMonth(year, month) {
    const yearsFrac = year + (month - 0.5) / 12 - 2000;
    return Math.floor(yearsFrac * 12.3685);
  }

  function newMoonCalendarDays(year) {
    const kStart = kForYearMonth(year, 1) - 3;
    const kEnd   = kForYearMonth(year, 12) + 3;
    const days = [];
    for (let k = kStart; k <= kEnd; k++) {
      const utc = jdeToUTCDate(newMoonJDE(k));
      const jst = new Date(utc.getTime() + 9*3600*1000);
      days.push(Date.UTC(jst.getUTCFullYear(), jst.getUTCMonth(), jst.getUTCDate()));
    }
    days.sort((a,b)=>a-b);
    return days.filter((d,i)=> i===0 || d!==days[i-1]);
  }

  const newMoonCache = {};
  function getNewMoonDays(year){
    if (!newMoonCache[year]) newMoonCache[year] = newMoonCalendarDays(year);
    return newMoonCache[year];
  }

  function newMoonsNear(year){
    return getNewMoonDays(year-1).concat(getNewMoonDays(year)).concat(getNewMoonDays(year+1));
  }

  function findCycleForYearMonth(year, month){
    const monthStart = Date.UTC(year, month-1, 1);
    const nmList = newMoonsNear(year);
    for (let i = 0; i < nmList.length - 1; i++){
      const hiloDate = nmList[i] + 86400000;
      if (hiloDate >= monthStart) {
        return { nm: nmList[i], nextNm: nmList[i+1] };
      }
    }
    return null;
  }

  function adjacentCycle(nm, nextNm, direction){
    const y = new Date(nm).getUTCFullYear();
    const nmList = newMoonsNear(y);
    const idx = nmList.indexOf(nm);
    if (idx === -1) return null;
    if (direction > 0) {
      if (idx+2 >= nmList.length) return null;
      return { nm: nmList[idx+1], nextNm: nmList[idx+2] };
    } else {
      if (idx-1 < 0) return null;
      return { nm: nmList[idx-1], nextNm: nmList[idx] };
    }
  }

  function dateFromUTCms(ms){ return new Date(ms); }

  function fmtDate(ms){
    const d = dateFromUTCms(ms);
    return (d.getUTCFullYear()) + '年' + (d.getUTCMonth()+1) + '月' + d.getUTCDate() + '日';
  }
  function fmtShort(ms){
    const d = dateFromUTCms(ms);
    return (d.getUTCMonth()+1) + '/' + d.getUTCDate();
  }

  // Marker emoji for specific moon-day-number ranges
  function markerForN(n){
    if (n >= 1 && n <= 3)   return '🔵';
    if (n >= 7 && n <= 10)  return '❤️';
    if (n >= 18 && n <= 20) return '🟢';
    if (n >= 23 && n <= 26) return '🩵';
    return '';
  }

  // ============================================================
  // Rendering
  // ============================================================
  let displayedCycle = null;

  function isSameUTCDate(ms1, ms2){
    const d1 = new Date(ms1), d2 = new Date(ms2);
    return d1.getUTCFullYear()===d2.getUTCFullYear() &&
           d1.getUTCMonth()===d2.getUTCMonth() &&
           d1.getUTCDate()===d2.getUTCDate();
  }

  function renderCycle(cycle){
    displayedCycle = cycle;
    const { nm, nextNm } = cycle;
    const lunLen = Math.round((nextNm - nm) / 86400000);

    document.getElementById('calTitle').textContent =
      fmtDate(nm + 86400000) + '〜' + fmtDate(nextNm) + '（1サイクル）';

    document.getElementById('periodBand').textContent =
      fmtShort(nm + 86400000) + ' 〜 ' + fmtShort(nextNm) +
      '（' + new Date(nm+86400000).getUTCFullYear() + '年）';

    const todayMs = Date.UTC(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

    const sheet = document.getElementById('sheet');
    // Remove old cells
    sheet.querySelectorAll('.cell').forEach(el => el.remove());

    for (let dayIdx = 1; dayIdx <= lunLen; dayIdx++){
      const n = (dayIdx === lunLen) ? 30 : dayIdx;
      const targetMs = nm + dayIdx*86400000;
      const d = new Date(targetMs);
      const md = fmtShort(targetMs);
      const dow = dowNames[d.getUTCDay()];
      const marker = markerForN(n);
      const isToday = isSameUTCDate(targetMs, todayMs);

      const grid = CELL_GRID[n];
      if (!grid) continue;

      const leftPct = (grid.cx / PAGE_W) * 100;
      const topPct  = (grid.kanaBottom / PAGE_H) * 100;

      const cell = document.createElement('div');
      cell.className = 'cell' + (isToday ? ' today' : '');
      cell.style.left = leftPct + '%';
      cell.style.top  = topPct + '%';
      cell.innerHTML =
        '<span class="md">' + md + '</span>' +
        '<span class="dow">(' + dow + ')</span>' +
        (marker ? '<span class="mk">' + marker + '</span>' : '');
      sheet.appendChild(cell);
    }
  }

  function populateYearSelect(){
    const sel = document.getElementById('yearInput');
    const current = new Date().getFullYear();
    sel.innerHTML = '';
    for (let y = current - 3; y <= current + 6; y++){
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '年';
      if (y === current) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  function showForYearMonth(year, month){
    currentYear = year;
    currentMonth = month;
    const cycle = findCycleForYearMonth(year, month);
    if (cycle) renderCycle(cycle);
  }

  document.getElementById('generateBtn').addEventListener('click', function(){
    const year = parseInt(document.getElementById('yearInput').value, 10);
    const month = parseInt(document.getElementById('monthInput').value, 10);
    if (!year || !month) return;
    showForYearMonth(year, month);
  });

  document.getElementById('prevBtn').addEventListener('click', function(){
    if (!displayedCycle) return;
    const prev = adjacentCycle(displayedCycle.nm, displayedCycle.nextNm, -1);
    if (prev) renderCycle(prev);
  });
  document.getElementById('nextBtn').addEventListener('click', function(){
    if (!displayedCycle) return;
    const next = adjacentCycle(displayedCycle.nm, displayedCycle.nextNm, 1);
    if (next) renderCycle(next);
  });
