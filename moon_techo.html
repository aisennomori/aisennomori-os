<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハワイアン・ムーン手帖 | 愛泉の杜</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root{
    --bg:#F7F2E8;
    --card:#FFFFFF;
    --ink:#2E2820;
    --ink-soft:#9A8F80;
    --line:#E0D8C8;
    --font-display:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
    --font-body:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
    --hoonui:#2AADA6;
    --hoonui-light:#E8F8F7;
    --poepoe:#D96A38;
    --poepoe-light:#FDF0E8;
    --hoemi:#4EA832;
    --hoemi-light:#EDF7E8;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); color:var(--ink); font-family:var(--font-body); }
  .page{ max-width:560px; margin:0 auto; padding:0 0 50px; min-height:100vh; }

  /* ===== Header ===== */
  header.app-header{
    background:linear-gradient(160deg,#2E2820 0%,#4A3F32 60%,#5A4F42 100%);
    color:#F7F1E4; padding:24px 20px 28px;
    border-radius:0 0 28px 28px;
    text-align:center; position:relative; overflow:hidden;
  }
  header.app-header::before{
    content:'🌙'; position:absolute;
    font-size:5rem; opacity:.07; right:-10px; top:-10px;
  }
  header.app-header h1{
    font-family:var(--font-display); font-weight:700;
    font-size:1.4rem; letter-spacing:.08em; margin-bottom:4px;
  }
  header.app-header .subtitle{ font-size:.72rem; color:#CFC4AE; letter-spacing:.12em; }

  /* ===== Controls ===== */
  .controls{
    display:flex; gap:10px; align-items:flex-end;
    padding:20px 16px 8px; flex-wrap:wrap;
  }
  .field{ display:flex; flex-direction:column; gap:4px; flex:1; min-width:80px; }
  .field label{ font-size:.72rem; color:var(--ink-soft); font-weight:500; }
  .field select{
    font-size:.88rem; padding:8px 10px;
    border:1px solid var(--line); border-radius:10px;
    background:#fff; color:var(--ink); appearance:none;
    font-family:var(--font-body);
  }
  .controls .gen-btn{
    font-family:var(--font-display); font-weight:700;
    font-size:.85rem; letter-spacing:.04em;
    color:#fff; background:var(--ink);
    border:none; border-radius:10px;
    padding:10px 18px; cursor:pointer; white-space:nowrap;
  }
  .controls .gen-btn:active{ opacity:.8; }

  /* ===== View Toggle ===== */
  .view-toggle{
    display:flex; gap:6px;
    margin:10px 16px 0;
  }
  .view-btn{
    flex:1; padding:10px 6px;
    border-radius:10px; border:2px solid var(--line);
    background:#fff; color:var(--ink-soft);
    font-family:var(--font-body); font-size:.82rem;
    cursor:pointer; font-weight:500;
    transition:all .18s; text-align:center;
    position:relative;
  }
  .view-btn.active{
    background:var(--hoonui);
    color:#fff;
    border-color:var(--hoonui);
    font-weight:700;
    box-shadow:0 3px 10px rgba(42,173,166,0.35);
  }
  .view-btn.active::after{
    content:'✔';
    position:absolute;
    top:4px; right:6px;
    font-size:.65rem;
    opacity:.85;
  }
  .view-btn:not(.active):hover{ border-color:var(--hoonui); color:var(--hoonui); }
  .view-btn:active{ opacity:.85; }

  /* ===== Cycle nav ===== */
  .cycle-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin:14px 16px 12px; gap:8px;
  }
  .nav-btn{
    flex-shrink:0; width:40px; height:40px; border-radius:50%;
    border:1px solid var(--line); background:#fff;
    font-size:1.1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  .nav-btn:active{ background:#F0EAD9; }
  .nav-btn:disabled{ opacity:.35; cursor:default; }
  .cycle-title{
    font-family:var(--font-display); font-weight:700;
    font-size:.88rem; text-align:center;
    flex:1; line-height:1.5;
    background:#fff;
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    box-shadow:0 1px 4px rgba(0,0,0,0.06);
  }

  /* ===== Sheet wrap ===== */
  .sheet-wrap{
    margin:0 12px 20px;
    container-type:inline-size;
  }

  .period-title{
    font-family:var(--font-display); font-weight:700;
    font-size:3.6cqw; color:var(--ink);
    text-align:center; margin-bottom:12px; letter-spacing:.03em;
  }

  /* ======================================
     案①：グリッド表示
  ====================================== */
  .group-block{ margin-bottom:7px; }

  .group-header{
    padding:3px 8px 3px 10px;
    border-radius:5px 5px 0 0;
    font-size:2cqw; font-weight:700;
    letter-spacing:.14em; color:#fff;
  }
  .group-header.hoonui{ background:var(--hoonui); }
  .group-header.poepoe{ background:var(--poepoe); }
  .group-header.hoemi { background:var(--hoemi);  }

  .day-grid{
    display:grid; grid-template-columns:repeat(10,1fr);
    gap:2px; background:var(--line);
    border-radius:0 0 5px 5px; padding:2px;
  }
  .day-cell{
    background:#fff; border-radius:3px;
    padding:3px 1px 4px; text-align:center;
    display:flex; flex-direction:column;
    align-items:center; gap:0; min-width:0; overflow:hidden;
  }
  .day-cell .moon-icon{ font-size:4.2cqw; line-height:1.3; }
  .day-cell .haw-name{
    font-size:1.55cqw; color:#666; line-height:1.25;
    width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .day-cell .kana{
    font-size:1.2cqw; color:#999; line-height:1.2;
    width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .day-cell .moon-num{
    font-size:2.4cqw; font-weight:700; color:var(--ink); line-height:1.35;
  }
  .day-cell .date-info{
    font-size:1.9cqw; font-weight:700; color:var(--ink); line-height:1.25;
  }
  .day-cell .dow-info{
    font-size:1.7cqw; color:var(--ink-soft); line-height:1.2;
  }
  .day-cell .marker{ font-size:2.6cqw; line-height:1.2; margin-top:1px; }
  .day-cell.today .date-info,
  .day-cell.today .dow-info{ color:#C0392B; }
  .day-cell.no-date,
  .day-card.no-date{ background:#f7f4ef; }

  /* ======================================
     案②：カード表示
  ====================================== */
  .group-section{ margin-bottom:16px; }

  .group-label{
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px; padding:0 4px;
  }
  .group-label-line{ flex:1; height:1px; }
  .group-label-text{
    font-size:3cqw; font-weight:700;
    letter-spacing:.18em; color:#fff;
    padding:4px 14px; border-radius:20px; white-space:nowrap;
  }
  .group-label.hoonui .group-label-text{ background:var(--hoonui); }
  .group-label.hoonui .group-label-line{ background:var(--hoonui); opacity:.4; }
  .group-label.poepoe .group-label-text{ background:var(--poepoe); }
  .group-label.poepoe .group-label-line{ background:var(--poepoe); opacity:.4; }
  .group-label.hoemi  .group-label-text{ background:var(--hoemi); }
  .group-label.hoemi  .group-label-line{ background:var(--hoemi); opacity:.4; }

  .card-grid{
    display:grid; grid-template-columns:repeat(5,1fr); gap:6px;
  }
  .day-card{
    border-radius:12px; padding:8px 4px 8px;
    display:flex; flex-direction:column;
    align-items:center; gap:2px; text-align:center;
    border:1px solid transparent; overflow:hidden;
  }
  .group-section.hoonui .day-card{ background:var(--hoonui-light); border-color:#C8EDEC; }
  .group-section.poepoe .day-card{ background:var(--poepoe-light); border-color:#F5D8C8; }
  .group-section.hoemi  .day-card{ background:var(--hoemi-light);  border-color:#D0ECC8; }
  .day-card.today{ border-color:#C0392B !important; box-shadow:0 0 0 1.5px #C0392B; }
  .day-card.today .date-info,
  .day-card.today .dow-info{ color:#C0392B !important; }
  .day-card.no-date{ opacity:.4; }

  .day-card .moon-icon{ font-size:6.5cqw; line-height:1; }
  .day-card .moon-num{
    font-size:3.5cqw; font-weight:700; color:var(--ink); line-height:1.2;
  }
  .day-card .haw-name{
    font-size:2cqw; color:#555; line-height:1.2;
    width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .day-card .kana{
    font-size:1.7cqw; color:#888; line-height:1.2;
    width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
  }
  .day-card .divider{ width:60%; height:1px; background:rgba(0,0,0,.1); margin:2px 0; }
  .day-card .date-info{
    font-size:2.8cqw; font-weight:700; color:var(--ink); line-height:1.3;
  }
  .day-card .dow-info{ font-size:2.2cqw; color:var(--ink-soft); line-height:1.2; }
  .day-card .marker{ font-size:3.5cqw; line-height:1; margin-top:2px; }

  /* ===== Legend ===== */
  .legend-note{
    margin:0 12px 16px; background:#fff;
    border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; font-size:.72rem;
    color:var(--ink-soft); line-height:1.9;
  }
  .legend-note .legend-row{
    display:inline-flex; align-items:center; gap:4px; margin-right:12px;
  }

  /* ===== Print/Save button ===== */
  .print-section{ margin:20px 12px 0; }
  .print-section button{
    width:100%; font-family:var(--font-display); font-weight:700;
    font-size:1rem; letter-spacing:.06em;
    color:#fff; background:var(--ink);
    border:none; border-radius:14px; padding:15px; cursor:pointer;
  }
  .print-section button:active{ opacity:.85; }
  .print-hint{ text-align:center; font-size:.7rem; color:var(--ink-soft); margin-top:8px; }

  /* ===== iOS modal ===== */
  .ios-modal-overlay{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.78); z-index:9999;
    align-items:flex-end; justify-content:center;
  }
  .ios-modal-overlay.active{ display:flex; }
  .ios-modal{
    background:#fff; border-radius:22px 22px 0 0;
    padding:24px 18px 44px; width:100%; max-width:560px;
    text-align:center; font-family:var(--font-body);
  }
  .ios-modal h3{ font-size:1rem; font-weight:700; margin-bottom:14px; color:var(--ink); }
  .ios-modal img#capturedImg{
    width:100%; border-radius:12px;
    border:1px solid var(--line); margin-bottom:14px;
  }
  .ios-modal .guide-text{
    font-size:.82rem; color:var(--ink-soft); line-height:1.75; margin-bottom:18px;
  }
  .ios-modal .guide-text strong{ color:var(--ink); }
  .ios-modal-close{
    width:100%; padding:13px; border-radius:12px;
    border:1px solid var(--line); background:#f5f0e8;
    font-family:var(--font-body); font-size:.9rem;
    cursor:pointer; color:var(--ink);
  }

  /* ===== Tooltip ===== */
  .tt-wrap{ position:relative; width:100%; }
  .tooltip{
    position:absolute;
    bottom:calc(100% + 6px);
    left:50%; transform:translateX(-50%);
    background:rgba(46,40,32,0.93);
    color:#F7F2E8;
    font-size:max(1.8cqw, 9px);
    font-family:var(--font-display);
    white-space:nowrap;
    padding:4px 8px;
    border-radius:6px;
    pointer-events:none;
    opacity:0;
    transition:opacity .18s;
    z-index:100;
    letter-spacing:.03em;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
  }
  .tooltip::after{
    content:'';
    position:absolute;
    top:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent;
    border-top-color:rgba(46,40,32,0.93);
  }
  .tt-wrap:hover .tooltip,
  .tt-wrap.tip-open .tooltip{ opacity:1; }


  /* 確定版月のピンク背景（✦マーク月） */
  .confirmed-month .group-block,
  .confirmed-month .group-section {
    background: #FFF0F3;
  }
  .confirmed-month .day-cell,
  .confirmed-month .day-card {
    background: #FFF0F3;
  }
  @media print{
    body{ background:#fff; }
    header.app-header,.controls,.view-toggle,.cycle-nav .nav-btn,
    .cycle-nav .cycle-title,.print-section{ display:none; }
    .cycle-nav{ margin:0; }
    .page{ max-width:100%; padding:0; }
    .sheet-wrap{ margin:0; }
    @page{ size:auto; margin:8mm; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="app-header">
    <h1>ハワイアン・ムーン手帖</h1>
    <p class="subtitle">愛泉の杜 ｰ Spirit Tools</p>
  </header>

  <section class="controls">
    <div class="field">
      <label for="yearInput">西暦年</label>
      <select id="yearInput"></select>
    </div>
    <div class="field">
      <label for="monthInput">月</label>
      <select id="monthInput">
        <option value="1">1月</option><option value="2">2月</option>
        <option value="3">3月</option><option value="4">4月</option>
        <option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option>
        <option value="9">9月</option><option value="10">10月</option>
        <option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <button class="gen-btn" id="generateBtn" type="button">表示する</button>
  </section>

  <!-- 表示切替トグル -->
  <div class="view-toggle">
    <button class="view-btn active" id="btnGrid" type="button">📓 グリッド表示</button>
    <button class="view-btn" id="btnCard" type="button">🌙 カード表示</button>
  </div>

  <div class="cycle-nav">
    <button class="nav-btn" id="prevBtn" type="button">⬅️</button>
    <div class="cycle-title" id="calTitle"></div>
    <button class="nav-btn" id="nextBtn" type="button">➡️</button>
  </div>

  <div class="sheet-wrap">
    <div id="sheetInner">
      <div class="period-title" id="periodBand"></div>
    </div>
  </div>

  <div class="legend-note">
    <span class="legend-row"><span>🔵</span>新しい事を始める</span>
    <span class="legend-row"><span>❤️</span>休息期</span>
    <span class="legend-row"><span>🟢</span>食物パワー</span>
    <span class="legend-row"><span>🩵</span>浄化期</span>
    <br>※ 各夜の日付・曜日は、今日であれば赤色で表示されます。
  </div>

  <section class="print-section">
    <button id="printBtn" type="button">PDFとして印刷</button>
    <p class="print-hint" id="printHint">印刷ダイアログで「PDFに保存」を選ぶとPDF化できます</p>
  </section>

</div>

<div class="ios-modal-overlay" id="iosModal">
  <div class="ios-modal">
    <h3>📸 画像を保存してください</h3>
    <img id="capturedImg" src="" alt="キャプチャ画像">
    <p class="guide-text">画像を<strong>長押し</strong>して<br>「<strong>写真に追加</strong>」または「<strong>画像を保存</strong>」を選んでください</p>
    <button class="ios-modal-close" id="iosModalClose">閉じる</button>
  </div>
</div>

<script>

  const dowNames=['日','月','火','水','木','金','土'];

  const moonData=[
    null,
    {n:1,  name:"Hilo",          kana:"ヒロ",             icon:"🌑", short:"始まりの芽生え"},
    {n:2,  name:"Hoaka",         kana:"ホアカ",            icon:"🌒", short:"光の兆し"},
    {n:3,  name:"Kū-kahi",       kana:"クーカヒ",          icon:"🌒", short:"意志が立つ"},
    {n:4,  name:"Kū-lua",        kana:"クールア",          icon:"🌒", short:"基盤を固める"},
    {n:5,  name:"Kū-kolu",       kana:"クーコル",          icon:"🌓", short:"形が整う"},
    {n:6,  name:"Kū-pau",        kana:"クーパウ",          icon:"🌓", short:"行動の完了"},
    {n:7,  name:"ʻOle-kū-kahi",   kana:"オレクーカヒ",      icon:"🌔", short:"停滞の始まり"},
    {n:8,  name:"ʻOle-kū-lua",    kana:"オレクールア",      icon:"🌔", short:"無理は禁物"},
    {n:9,  name:"ʻOle-kū-kolu",   kana:"オレクーコル",      icon:"🌔", short:"流れに任せる"},
    {n:10, name:"ʻOle-pau",       kana:"オレパウ",          icon:"🌔", short:"停滞の終わり"},
    {n:11, name:"Huna",          kana:"フナ",              icon:"🌔", short:"静かに満ちる"},
    {n:12, name:"Mōhalu",        kana:"モーハル",          icon:"🌕", short:"花開く日"},
    {n:13, name:"Hua",           kana:"ファア",            icon:"🌕", short:"実りの兆し"},
    {n:14, name:"Akua",          kana:"アクア",            icon:"🌕", short:"神聖が満ちる"},
    {n:15, name:"Hoku",          kana:"ホク",              icon:"🌕", short:"満月の力"},
    {n:16, name:"Māhealani",     kana:"マヘアラニ",        icon:"🌕", short:"最高潮の光"},
    {n:17, name:"Kulu",          kana:"クル",              icon:"🌖", short:"手放しの始まり"},
    {n:18, name:"Lāʻau-kū-kahi",  kana:"ラーアウクーカヒ",  icon:"🌖", short:"植物の力①"},
    {n:19, name:"Lāʻau-kū-lua",   kana:"ラーアウクールア",  icon:"🌗", short:"植物の力②"},
    {n:20, name:"Lāʻau-pau",      kana:"ラーアウパウ",      icon:"🌗", short:"植物の完了"},
    {n:21, name:"ʻOle-kū-kahi",   kana:"オレクーカヒ",      icon:"🌗", short:"浄化の始まり"},
    {n:22, name:"ʻOle-kū-lua",    kana:"オレクールア",      icon:"🌗", short:"整理が進む"},
    {n:23, name:"ʻOle-pau",       kana:"オレパウ",          icon:"🌘", short:"浄化の完了"},
    {n:24, name:"Kāloa-kū-kahi", kana:"カーロアクーカヒ",  icon:"🌘", short:"海の力①"},
    {n:25, name:"Kāloa-kū-lua",  kana:"カーロアクールア",  icon:"🌘", short:"海の力②"},
    {n:26, name:"Kāloa-pau",     kana:"カーロアパウ",      icon:"🌘", short:"海の最大浄化"},
    {n:27, name:"Kāne",          kana:"カーネ",            icon:"🌘", short:"生命の源"},
    {n:28, name:"Lono",          kana:"ロノ",              icon:"🌑", short:"恵みと調和"},
    {n:29, name:"Mauli",         kana:"マウリ",            icon:"🌑", short:"生命の残り火"},
    {n:30, name:"Muku",          kana:"ムク",              icon:"🌑", short:"完全な終わり"},
  ];

  const GROUPS=[
    {id:'hoonui', label:"HO'ONUI", range:[1,10]},
    {id:'poepoe', label:'POEPOE',  range:[11,20]},
    {id:'hoemi',  label:"HO'EMI",  range:[21,30]},
  ];

  // ============================================================
  // ハワイアンムーン コアロジック
  //
  // 【基本】仮版（天文計算）
  //   Hilo(1夜目) = 前の新月 + 1日
  //   Muku(30夜目) = 次の新月
  //   Mauli有無 = 新月間隔が30日なら「あり」
  //
  // 【上書き】確定版テーブル（先生データ）
  //   CONFIRMED に追加するだけで該当月が自動的に上書き
  //   キー = 仮版HiloのYYYY-MM
  //   値   = { hilo, muku, hasMauli }
  // ============================================================

  const D = 86400000; // 1日 = ミリ秒

  // ── 確定版テーブル ──────────────────────────────────────────
  // ※ 毎年先生から届いたら追加する（それだけでOK）
  const CONFIRMED = {
    '2026-07': { hilo:'2026-07-14', muku:'2026-08-12', hasMauli:false },
    '2026-08': { hilo:'2026-08-13', muku:'2026-09-11', hasMauli:true  },
    '2026-09': { hilo:'2026-09-12', muku:'2026-10-10', hasMauli:false },
    '2026-10': { hilo:'2026-10-11', muku:'2026-11-09', hasMauli:true  },
    '2026-11': { hilo:'2026-11-10', muku:'2026-12-09', hasMauli:true  },
    '2026-12': { hilo:'2026-12-10', muku:'2027-01-08', hasMauli:true  },
  };

  // ── 天文計算（Meeus）────────────────────────────────────────
  function newMoonJDE(k){
    const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
    const r=Math.PI/180,E=1-0.002516*T-0.0000074*T2;
    const Mm=((201.5643+385.81693528*k+0.0107582*T2+0.00001238*T3-0.000000058*T4)%360)*r;
    const Ms=((2.5534+29.10535670*k-0.0000014*T2-0.00000011*T3)%360)*r;
    const Fm=((160.7108+390.67050284*k-0.0016118*T2-0.00000227*T3)%360)*r;
    const Og=((124.7746-1.56375588*k+0.0020672*T2+0.00000215*T3)%360)*r;
    const s=Math.sin,E2=E*E;
    return 2451550.09766+29.530588861*k+0.00015437*T2-0.000000150*T3+0.00000000073*T4
      -0.40720*s(Mm)+0.17241*E*s(Ms)+0.01608*s(2*Mm)+0.01039*s(2*Fm)
      +0.00739*E*s(Mm-Ms)-0.00514*E*s(Mm+Ms)+0.00208*E2*s(2*Ms)
      -0.00111*s(Mm-2*Fm)-0.00057*s(Mm+2*Fm)+0.00056*E*s(2*Mm+Ms)
      -0.00042*s(3*Mm)+0.00042*E*s(Ms+2*Fm)+0.00038*E*s(Ms-2*Fm)
      -0.00024*E*s(2*Mm-Ms)-0.00017*s(Og)-0.00007*s(Mm+2*Ms)
      +0.00004*s(2*Mm-2*Fm)+0.00004*s(3*Ms)+0.00003*s(Mm+Ms-2*Fm)
      +0.00003*s(2*Mm+2*Fm)-0.00003*s(Mm+Ms+2*Fm)+0.00003*s(Mm-Ms+2*Fm)
      -0.00002*s(Mm-Ms-2*Fm)-0.00002*s(3*Mm+Ms)+0.00002*s(4*Mm);
  }
  function kFor(y,m){ return Math.floor((y+(m-0.5)/12-2000)*12.3685); }

  const nmCache={};
  function getNM(y){
    if(nmCache[y]) return nmCache[y];
    const seen=new Set(), list=[];
    for(let k=kFor(y,1)-4; k<=kFor(y,12)+4; k++){
      const jst=new Date((newMoonJDE(k)-2440587.5)*D+9*3600*1000);
      const ms=Date.UTC(jst.getUTCFullYear(),jst.getUTCMonth(),jst.getUTCDate());
      if(!seen.has(ms)){ seen.add(ms); list.push(ms); }
    }
    return nmCache[y]=list.sort((a,b)=>a-b);
  }
  function nmNear(y){
    const merged=getNM(y-1).concat(getNM(y),getNM(y+1));
    const seen=new Set();
    return merged.filter(ms=>seen.has(ms)?false:seen.add(ms)).sort((a,b)=>a-b);
  }

  // ── サイクル取得 ─────────────────────────────────────────────
  // cycle = { hiloMs, mukuMs, hasMauli, isConfirmed }
  function findCycle(y,m){
    const monthStart=Date.UTC(y,m-1,1);
    const monthEnd=Date.UTC(m<12?y:y+1, m<12?m:0, 1);
    const list=nmNear(y);
    for(let i=1; i<list.length; i++){
      const hiloKari=list[i-1]+D;  // 仮版Hilo
      if(hiloKari<monthStart||hiloKari>=monthEnd) continue;

      // 仮版HiloのYYYY-MMで確定版を検索 → あれば上書き
      const hd=new Date(hiloKari);
      const key=hd.getUTCFullYear()+'-'+String(hd.getUTCMonth()+1).padStart(2,'0');
      const ov=CONFIRMED[key];
      if(ov) return {
        hiloMs: new Date(ov.hilo+'T00:00:00Z').getTime(),
        mukuMs: new Date(ov.muku+'T00:00:00Z').getTime(),
        hasMauli: ov.hasMauli,
        isConfirmed: true,
      };

      // 仮版
      const hasMauli=Math.round((list[i]-list[i-1])/D)===30;
      return { hiloMs:hiloKari, mukuMs:list[i], hasMauli, isConfirmed:false };
    }
    return null;
  }

  // ── ±1月移動 ─────────────────────────────────────────────────
  function adjCycle(cycle,dir){
    const d=new Date(cycle.hiloMs);
    let y=d.getUTCFullYear(), m=d.getUTCMonth()+1+dir;
    if(m>12){m=1;y++;}else if(m<1){m=12;y--;}
    return findCycle(y,m);
  }

  // ── 指定日の夜番号（1〜30）───────────────────────────────────
  function getMoonNight(year,month,day){
    const target=Date.UTC(year,month-1,day);
    for(let dm=-1; dm<=1; dm++){
      let m=month+dm, y=year;
      if(m<1){m=12;y--;} if(m>12){m=1;y++;}
      const cy=findCycle(y,m);
      if(!cy) continue;
      const{hiloMs,mukuMs,hasMauli}=cy;
      if(target===mukuMs) return 30;
      if(target===mukuMs-D && hasMauli) return 29;
      const offset=Math.round((target-hiloMs)/D);
      if(offset>=0 && offset<=27) return offset+1;
    }
    return null;
  }

  // ── 30夜マップ生成 ────────────────────────────────────────────
  function buildDayMap(cycle){
    const{hiloMs,mukuMs,hasMauli}=cycle;
    const today=Date.UTC(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
    const map={};
    for(let i=0; i<28; i++){
      const ms=hiloMs+i*D;
      map[i+1]={ms, isToday:ms===today};
    }
    map[29]=hasMauli ? {ms:mukuMs-D, isToday:(mukuMs-D)===today} : null;
    map[30]={ms:mukuMs, isToday:mukuMs===today};
    return map;
  }

function fmtDate(ms){const d=new Date(ms);return d.getUTCFullYear()+'年'+(d.getUTCMonth()+1)+'月'+d.getUTCDate()+'日';}
  function fmtShort(ms){const d=new Date(ms);return(d.getUTCMonth()+1)+'/'+d.getUTCDate();}
  function markerForN(n){
    if(n>=1&&n<=3)return'🔵';if(n>=7&&n<=10)return'❤️';
    if(n>=18&&n<=20)return'🟢';if(n>=23&&n<=26)return'🩵';return'';
  }
  function sameUTC(a,b){const da=new Date(a),db=new Date(b);return da.getUTCFullYear()===db.getUTCFullYear()&&da.getUTCMonth()===db.getUTCMonth()&&da.getUTCDate()===db.getUTCDate();}

  // ===== ツールチップ（タッチデバイス対応） =====
  let openTip=null;
  function addTooltipTouch(wrap){
    wrap.addEventListener('touchstart',function(e){
      e.stopPropagation();
      if(openTip&&openTip!==wrap) openTip.classList.remove('tip-open');
      wrap.classList.toggle('tip-open');
      openTip=wrap.classList.contains('tip-open')?wrap:null;
    },{passive:true});
  }
  document.addEventListener('touchstart',function(){
    if(openTip){openTip.classList.remove('tip-open');openTip=null;}
  },{passive:true});

  // ===== モード管理 =====
  let currentMode = localStorage.getItem('moonTechoMode') || 'grid';
  let displayedCycle = null;

  function setMode(mode){
    currentMode = mode;
    localStorage.setItem('moonTechoMode', mode);
    document.getElementById('btnGrid').classList.toggle('active', mode==='grid');
    document.getElementById('btnCard').classList.toggle('active', mode==='card');
    if(displayedCycle) renderCycle(displayedCycle);
  }

  // ── レンダリング ──────────────────────────────────────────────
  // Mauli有無：Hilo間隔が30日のサイクルのみMauliあり
  // 夜の割り当て：Hiloから純粋に順番カウント（逆算なし）
  //   Mauliあり: 1〜29夜=Hilo+0〜28日, 30夜目=Hilo+29日
  //   Mauliなし: 1〜28夜=Hilo+0〜27日, 29夜目=null, 30夜目=Hilo+28日
  

  function renderGrid(inner,dayMap){
    GROUPS.forEach(group=>{
      const block=document.createElement('div');
      block.className='group-block';
      const hdr=document.createElement('div');
      hdr.className='group-header '+group.id;
      hdr.textContent=group.label;
      block.appendChild(hdr);
      const grid=document.createElement('div');
      grid.className='day-grid';
      for(let n=group.range[0];n<=group.range[1];n++){
        const md=moonData[n],di=dayMap[n];
        const wrap=document.createElement('div');
        wrap.className='tt-wrap';
        const tip=document.createElement('div');
        tip.className='tooltip';
        tip.textContent=md.short||'';
        wrap.appendChild(tip);
        const cell=document.createElement('div');
        if(!di){
          cell.className='day-cell no-date';
          cell.innerHTML='<span class="moon-icon" style="opacity:.25">'+md.icon+'</span>'+
            '<span class="haw-name" style="opacity:.3">'+md.name+'</span>'+
            '<span class="kana" style="opacity:.3">'+md.kana+'</span>'+
            '<span class="moon-num" style="opacity:.3">'+n+'</span>'+
            '<span class="date-info" style="color:var(--ink-soft);font-weight:400;font-size:1.6cqw;">—</span>'+
            '<span class="dow-info" style="visibility:hidden">(-)</span>'+
            '<span class="marker">&nbsp;</span>';
        } else {
          cell.className='day-cell'+(di.isToday?' today':'');
          const mk=markerForN(n);
          cell.innerHTML='<span class="moon-icon">'+md.icon+'</span>'+
            '<span class="haw-name">'+md.name+'</span>'+
            '<span class="kana">'+md.kana+'</span>'+
            '<span class="moon-num">'+n+'</span>'+
            '<span class="date-info">'+fmtShort(di.ms)+'</span>'+
            '<span class="dow-info">('+dowNames[new Date(di.ms).getUTCDay()]+')</span>'+
            '<span class="marker">'+(mk||'&nbsp;')+'</span>';
        }
        wrap.appendChild(cell);
        addTooltipTouch(wrap);
        grid.appendChild(wrap);
      }
      block.appendChild(grid);
      inner.appendChild(block);
    });
  }

  function renderCard(inner,dayMap){
    GROUPS.forEach(group=>{
      const sec=document.createElement('div');
      sec.className='group-section '+group.id;
      const lbl=document.createElement('div');
      lbl.className='group-label '+group.id;
      lbl.innerHTML='<div class="group-label-line"></div>'+
        '<div class="group-label-text">'+group.label+'</div>'+
        '<div class="group-label-line"></div>';
      sec.appendChild(lbl);
      const grid=document.createElement('div');
      grid.className='card-grid';
      for(let n=group.range[0];n<=group.range[1];n++){
        const md=moonData[n],di=dayMap[n];
        const wrap=document.createElement('div');
        wrap.className='tt-wrap';
        const tip=document.createElement('div');
        tip.className='tooltip';
        tip.textContent=md.short||'';
        wrap.appendChild(tip);
        const card=document.createElement('div');
        if(!di){
          card.className='day-card no-date';
          card.innerHTML='<span class="moon-icon" style="opacity:.25">'+md.icon+'</span>'+
            '<span class="moon-num" style="opacity:.3">'+n+'</span>'+
            '<span class="haw-name" style="opacity:.3">'+md.name+'</span>'+
            '<span class="kana" style="opacity:.3">'+md.kana+'</span>'+
            '<div class="divider"></div>'+
            '<span class="date-info" style="color:var(--ink-soft);font-weight:400;font-size:2.2cqw;">—</span>'+
            '<span class="dow-info" style="visibility:hidden">(-)</span>'+
            '<span class="marker">&nbsp;</span>';
        } else {
          card.className='day-card'+(di.isToday?' today':'');
          const mk=markerForN(n);
          card.innerHTML='<span class="moon-icon">'+md.icon+'</span>'+
            '<span class="moon-num">'+n+'</span>'+
            '<span class="haw-name">'+md.name+'</span>'+
            '<span class="kana">'+md.kana+'</span>'+
            '<div class="divider"></div>'+
            '<span class="date-info">'+fmtShort(di.ms)+'</span>'+
            '<span class="dow-info">('+dowNames[new Date(di.ms).getUTCDay()]+')</span>'+
            '<span class="marker">'+(mk||'&nbsp;')+'</span>';
        }
        wrap.appendChild(card);
        addTooltipTouch(wrap);
        grid.appendChild(wrap);
      }
      sec.appendChild(grid);
      inner.appendChild(sec);
    });
  }

  function renderCycle(cycle){
    displayedCycle=cycle;
    const{hiloMs,mukuMs,hasMauli}=cycle;
    document.getElementById('calTitle').textContent=fmtDate(hiloMs)+'〜'+fmtDate(mukuMs)+(cycle.isConfirmed?' ✦':'');
    // 確定月はシートに薄いピンク背景を追加
    const sheet=document.getElementById('sheetInner');
    if(cycle.isConfirmed) sheet.classList.add('confirmed-month');
    else sheet.classList.remove('confirmed-month');
    const dayMap=buildDayMap(cycle);
    const inner=document.getElementById('sheetInner');
    const pb=document.getElementById('periodBand');
    inner.innerHTML='';
    inner.appendChild(pb);
    if(currentMode==='grid') renderGrid(inner,dayMap);
    else renderCard(inner,dayMap);
  }

  function populateYearSelect(){
    const sel=document.getElementById('yearInput'),cur=new Date().getFullYear();
    for(let y=cur+5;y>=cur-80;y--){
      const o=document.createElement('option');
      o.value=y;o.textContent=y+'年';
      if(y===cur)o.selected=true;
      sel.appendChild(o);
    }
  }

  // ===== Events =====
  document.getElementById('generateBtn').addEventListener('click',function(){
    const y=parseInt(document.getElementById('yearInput').value,10);
    const m=parseInt(document.getElementById('monthInput').value,10);
    if(!y||!m)return;
    const c=findCycle(y,m);if(c)renderCycle(c);
  });
  document.getElementById('prevBtn').addEventListener('click',function(){
    if(!displayedCycle)return;
    const p=adjCycle(displayedCycle,-1);if(p)renderCycle(p);
  });
  document.getElementById('nextBtn').addEventListener('click',function(){
    if(!displayedCycle)return;
    const nx=adjCycle(displayedCycle,1);if(nx)renderCycle(nx);
  });
  document.getElementById('btnGrid').addEventListener('click',()=>setMode('grid'));
  document.getElementById('btnCard').addEventListener('click',()=>setMode('card'));

  // ===== iOS =====
  function isIOS(){
    return/iPhone|iPad|iPod/i.test(navigator.userAgent)||
      (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  }
  (function(){
    if(isIOS()){
      document.getElementById('printBtn').textContent='📸 画像として保存';
      document.getElementById('printHint').textContent='画像が表示されます。長押しして写真に保存してください。';
    }
  })();
  document.getElementById('printBtn').addEventListener('click',async function(){
    if(!isIOS()){window.print();return;}
    const btn=this;btn.textContent='生成中...';btn.disabled=true;
    try{
      const canvas=await html2canvas(document.getElementById('sheetInner'),{
        scale:2,useCORS:true,allowTaint:true,logging:false,backgroundColor:'#F7F2E8'
      });
      document.getElementById('capturedImg').src=canvas.toDataURL('image/png');
      document.getElementById('iosModal').classList.add('active');
    }catch(e){
      alert('キャプチャに失敗しました。\nスクリーンショット（電源＋音量↑ボタン）で保存してください。');
    }finally{
      btn.textContent='📸 画像として保存';btn.disabled=false;
    }
  });
  document.getElementById('iosModalClose').addEventListener('click',function(){
    document.getElementById('iosModal').classList.remove('active');
    document.getElementById('capturedImg').src='';
  });
  document.getElementById('iosModal').addEventListener('click',function(e){
    if(e.target===this){this.classList.remove('active');document.getElementById('capturedImg').src='';}
  });

  // ===== トグルの初期状態を反映 =====
  document.getElementById('btnGrid').classList.toggle('active', currentMode==='grid');
  document.getElementById('btnCard').classList.toggle('active', currentMode==='card');

  // ===== Init =====
  populateYearSelect();
  (function(){
    const now=new Date();
    document.getElementById('monthInput').value=now.getMonth()+1;
    const c=findCycle(now.getFullYear(),now.getMonth()+1);
    if(c)renderCycle(c);
  })();
</script>
</body>
